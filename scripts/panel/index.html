      <Card><div style={{padding:16}}><div style={{fontSize:11,fontWeight:600,color:'var(--text-tertiary)',marginBottom:8}}>Server Performance</div><canvas ref={perfRef} style={{height:250}}></canvas></div></Card>
      <Card><div style={{padding:16}}><div style={{fontSize:11,fontWeight:600,color:'var(--text-tertiary)',marginBottom:8}}>Player Activity</div><canvas ref={playersRef} style={{height:250}}></canvas></div></Card>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
      <StatCard label="Avg TPS" value={data?.avg_tps||'--'} icon="zap" iconBg="rgba(16,185,129,0.15)"/>
      <StatCard label="Peak Players" value={data?.peak_players||'--'} icon="trending-up" iconBg="rgba(59,130,246,0.15)"/>
      <StatCard label="Uptime" value={(data?.uptime_pct||'--')+'%'} icon="clock" iconBg="rgba(245,158,11,0.15)"/>
      <StatCard label="Avg RAM" value={(data?.avg_ram||'--')+' MB'} icon="memory-stick" iconBg="rgba(6,182,212,0.15)"/>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   CONSOLE VIEW
   ═══════════════════════════════════════════ */
function ConsoleView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [output,setOutput]=useState('Waiting for output...');
  const [input,setInput]=useState('');
  const [autoScroll,setAutoScroll]=useState(true);
  const [cmdHistory,setCmdHistory]=useState([]);
  const [cmdIdx,setCmdIdx]=useState(-1);
  const bodyRef=useRef();

  const loadConsole=useCallback(async()=>{
    if(!sid)return;
    try{
      const d=await $a('/console','GET',null,sid);
      if(d){
        let text=d.logs||d.output||'No output.';
        const lines=text.split('\n');
        const html=lines.map(line=>{
          let h=escHtml(line);
          h=h.replace(/^(\[\d{2}:\d{2}:\d{2}\])/gm,'<span style="color:#55556a">$1</span>');
          h=h.replace(/\b(ERROR)\b/g,'<span style="color:#E54B4B;font-weight:600">$1</span>');
          h=h.replace(/\b(WARN(?:ING)?)\b/g,'<span style="color:#FAED70;font-weight:600">$1</span>');
          h=h.replace(/\b(INFO)\b/g,'<span style="color:#396FE2;font-weight:600">$1</span>');
          h=h.replace(/(joined the game)/gi,'<span style="color:#9ECE58">$1</span>');
          h=h.replace(/(left the game)/gi,'<span style="color:#E54B4B">$1</span>');
          return h;
        }).join('\n');
        setOutput(html);
      }
    }catch(e){}
  },[sid]);

  useEffect(()=>{loadConsole();const iv=setInterval(loadConsole,3000);return()=>clearInterval(iv)},[loadConsole]);

  useEffect(()=>{
    if(autoScroll&&bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;
  },[output,autoScroll]);

  async function sendCmd(){
    if(!input.trim())return;
    const c=input.trim();
    setCmdHistory(prev=>[c,...prev].slice(0,100));
    setCmdIdx(-1);setInput('');
    try{const r=await $a('/command','POST',{command:c},sid);addToast(r&&r.success?'Sent: '+c:'Failed',r&&r.success?'success':'error')}
    catch(e){addToast('Failed','error')}
    setTimeout(loadConsole,800);
  }

  function handleKey(e){
    if(e.key==='Enter'){sendCmd()}
    else if(e.key==='ArrowUp'){e.preventDefault();if(cmdHistory.length>0&&cmdIdx<cmdHistory.length-1){const ni=cmdIdx+1;setCmdIdx(ni);setInput(cmdHistory[ni]||'')}}
    else if(e.key==='ArrowDown'){e.preventDefault();if(cmdIdx>0){const ni=cmdIdx-1;setCmdIdx(ni);setInput(cmdHistory[ni]||'')}else{setCmdIdx(-1);setInput('')}}
  }

  return <div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 140px)',animation:'fadeInUp 0.3s ease'}}>
    <div className="glass" style={{borderRadius:12,overflow:'hidden',display:'flex',flexDirection:'column',flex:1}}>
      <div style={{padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border-subtle)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'flex',gap:5}}>
            <span style={{width:9,height:9,borderRadius:'50%',background:'#ff5f57'}}></span>
            <span style={{width:9,height:9,borderRadius:'50%',background:'#febc2e'}}></span>
            <span style={{width:9,height:9,borderRadius:'50%',background:'#28c840'}}></span>
          </div>
          <span style={{fontSize:11,fontWeight:600,color:'var(--text-tertiary)',marginLeft:10}}>server console</span>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <Button size="sm" variant={autoScroll?'success':'ghost'} onClick={()=>setAutoScroll(!autoScroll)}><Icon name="arrow-down" size={12}/></Button>
          <Button size="sm" variant="ghost" onClick={()=>setOutput('<span style="color:var(--text-secondary)">Console cleared.</span>')}><Icon name="trash-2" size={12}/></Button>
          <Button size="sm" variant="ghost" onClick={loadConsole}><Icon name="refresh-cw" size={12}/></Button>
        </div>
      </div>
      <div ref={bodyRef} style={{flex:1,overflowY:'auto',padding:12,fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.75,whiteSpace:'pre-wrap',wordBreak:'break-all',color:'var(--text-secondary)',background:'#0a0a0f'}} dangerouslySetInnerHTML={{__html:output}}></div>
      <div style={{display:'flex',alignItems:'center',borderTop:'1px solid var(--border-subtle)',background:'rgba(0,0,0,0.4)',flexShrink:0}}>
        <span style={{padding:'0 10px 0 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'var(--success)',userSelect:'none'}}>$</span>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder="Enter command..." style={{flex:1,padding:'11px 14px 11px 0',background:'transparent',border:'none',outline:'none',color:'var(--text-primary)',fontFamily:"'JetBrains Mono',monospace",fontSize:12,minHeight:44}}/>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   FILES VIEW
   ═══════════════════════════════════════════ */
function FilesView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [currentDir,setCurrentDir]=useState('/');
  const [files,setFiles]=useState([]);
  const [editFile,setEditFile]=useState(null);
  const [editContent,setEditContent]=useState('');
  const [loading,setLoading]=useState(false);
  const fileInputRef=useRef();

  const loadDir=useCallback(async(path)=>{
    path=path||'/';setCurrentDir(path);setLoading(true);
    try{const d=await $a('/files?path='+encodeURIComponent(path),'GET',null,sid);setFiles(d.files||[])}
    catch(e){addToast('Failed to load directory','error')}
    setLoading(false);
  },[sid,addToast]);

  useEffect(()=>{loadDir('/')},[sid]);

  async function openFile(path){
    setLoading(true);
    try{const d=await $a('/file/read?path='+encodeURIComponent(path),'GET',null,sid);setEditFile(path);setEditContent(d.content||'')}
    catch(e){addToast('Cannot open file','error')}
    setLoading(false);
  }

  async function saveFile(){
    try{const r=await $a('/file/save','POST',{path:editFile,content:editContent},sid);addToast(r&&r.success?'Saved':'Failed',r&&r.success?'success':'error')}
    catch(e){addToast('Save failed','error')}
  }

  async function deleteFile(path,name){
    if(!confirm('Delete "'+name+'"?'))return;
    try{const r=await $a('/file/delete','POST',{path},sid);addToast(r&&r.success?'Deleted':'Failed',r&&r.success?'success':'error');loadDir(currentDir)}
    catch(e){addToast('Failed','error')}
  }

  async function uploadFiles(inp){
    if(!inp.files.length)return;
    for(let i=0;i<inp.files.length;i++){
      const f=inp.files[i];addToast('Uploading '+f.name+'...','info');
      const fd=new FormData();fd.append('file',f);fd.append('path',currentDir||'/');
      try{const r=await $upload('/file/upload',fd,sid);const d=await r.json();addToast(d.success?'Uploaded':'Failed',d.success?'success':'error')}
      catch(e){addToast('Upload failed','error')}
    }
    inp.value='';loadDir(currentDir);
  }

  async function createItem(type){
    const name=prompt(type==='file'?'File name:':'Folder name:');
    if(!name||!name.trim())return;
    const p=(currentDir==='/'?'':currentDir)+'/'+name.trim();
    try{
      const url=type==='file'?'/file/create':'/file/mkdir';
      const body=type==='file'?{path:p,content:''}:{path:p};
      const r=await $a(url,'POST',body,sid);addToast(r&&r.success?'Created':'Failed',r&&r.success?'success':'error');loadDir(currentDir);
    }catch(e){addToast('Failed','error')}
  }

  async function renameItem(oldPath,name){
    const newName=prompt('New name:',name);
    if(!newName||!newName.trim())return;
    const dir=oldPath.substring(0,oldPath.lastIndexOf('/'));
    try{const r=await $a('/file/rename','POST',{old_path:oldPath,new_path:dir+'/'+newName.trim()},sid);addToast(r&&r.success?'Renamed':'Failed',r&&r.success?'success':'error');loadDir(currentDir)}
    catch(e){addToast('Failed','error')}
  }

  function getFileIcon(name,isDir){
    if(isDir)return {bg:'rgba(245,158,11,0.15)',color:'#f59e0b',icon:'folder'};
    const ext=(name||'').split('.').pop().toLowerCase();
    if(['yml','yaml','json','properties','toml'].includes(ext))return {bg:'rgba(139,92,246,0.15)',color:'#a78bfa',icon:'file-cog'};
    if(['log','txt'].includes(ext))return {bg:'rgba(16,185,129,0.15)',color:'#10b981',icon:'file-text'};
    if(ext==='jar')return {bg:'rgba(239,68,68,0.15)',color:'#ef4444',icon:'package'};
    if(['sh','py','js','ts'].includes(ext))return {bg:'rgba(6,182,212,0.15)',color:'#06b6d4',icon:'file-code'};
    return {bg:'rgba(59,130,246,0.15)',color:'#3b82f6',icon:'file'};
  }

  const sorted=[...files].sort((a,b)=>{if(a.is_dir!==b.is_dir)return a.is_dir?-1:1;return(a.name||'').localeCompare(b.name||'')});
  const crumbs=currentDir.split('/').filter(Boolean);

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
      <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:2,background:'var(--bg-input)',border:'1px solid var(--border-subtle)',padding:'6px 10px',borderRadius:8,overflowX:'auto',fontSize:12}}>
        <span onClick={()=>loadDir('/')} style={{color:'var(--accent)',cursor:'pointer',padding:'2px 4px',borderRadius:4,fontWeight:500}}>root</span>
        {crumbs.map((p,i)=>{
          const path='/'+crumbs.slice(0,i+1).join('/');
          return <Fragment key={i}><span style={{color:'var(--text-tertiary)',fontSize:10}}>/</span><span onClick={()=>loadDir(path)} style={{color:'var(--accent)',cursor:'pointer',padding:'2px 4px',borderRadius:4,fontWeight:500,whiteSpace:'nowrap'}}>{escHtml(p)}</span></Fragment>;
        })}
      </div>
      <Button size="sm" onClick={()=>fileInputRef.current&&fileInputRef.current.click()}><Icon name="upload" size={12}/>Upload</Button>
      <input ref={fileInputRef} type="file" multiple style={{display:'none'}} onChange={e=>uploadFiles(e.target)}/>
      <Button size="sm" variant="ghost" onClick={()=>createItem('file')}><Icon name="file-plus" size={12}/></Button>
      <Button size="sm" variant="ghost" onClick={()=>createItem('dir')}><Icon name="folder-plus" size={12}/></Button>
      <Button size="sm" variant="ghost" onClick={()=>loadDir(currentDir)}><Icon name="refresh-cw" size={12}/></Button>
    </div>

    <Card>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:500}}>
          <thead><tr>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Name</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left',width:100}}>Size</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left',width:140}}>Modified</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left',width:100}}>Actions</th>
          </tr></thead>
          <tbody>
            {loading?<tr><td colSpan={4} style={{padding:20}}><Spinner size={24}/></td></tr>:
            !sorted.length?<tr><td colSpan={4}><EmptyState icon="folder-open" message="Empty directory"/></td></tr>:
            sorted.map((f,i)=>{
              const fi=getFileIcon(f.name,f.is_dir);
              const sz=f.is_dir?(f.size_formatted||'-'):(f.size_formatted||formatSize(f.size));
              return <tr key={i} onClick={()=>f.is_dir&&loadDir(f.path)} onDoubleClick={()=>!f.is_dir&&openFile(f.path)} style={{borderBottom:'1px solid var(--border-subtle)',cursor:'pointer'}}>
                <td style={{padding:'8px 14px',fontSize:12,verticalAlign:'middle'}}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div style={{width:28,height:28,borderRadius:6,display:'grid',placeItems:center,background:fi.bg}}><Icon name={fi.icon} size={13} style={{color:fi.color}}/></div>
                    <span style={{fontWeight:500,color:'var(--text-primary)'}}>{escHtml(f.name)}</span>
                  </div>
                </td>
                <td style={{padding:'8px 14px',fontSize:11,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace"}}>{escHtml(sz)}</td>
                <td style={{padding:'8px 14px',fontSize:11,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace"}}>{escHtml(f.modified||'')}</td>
                <td style={{padding:'8px 14px'}}>
                  <div style={{display:'flex',gap:2,opacity:0,transition:'opacity 0.12s'}} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0'}>
                    {!f.is_dir&&<Button size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openFile(f.path)}}><Icon name="pencil" size={12}/></Button>}
                    <Button size="sm" variant="ghost" onClick={e=>{e.stopPropagation();renameItem(f.path,f.name)}}><Icon name="type" size={12}/></Button>
                    <Button size="sm" variant="ghost" onClick={e=>{e.stopPropagation();deleteFile(f.path,f.name)}}><Icon name="trash-2" size={12}/></Button>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </Card>

    {editFile&&<div style={{marginTop:14,animation:'fadeInUp 0.3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--bg-elevated)',border:'1px solid var(--border-subtle)',borderRadius:'12px 12px 0 0'}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="file-code" size={13}/>{escHtml(editFile)}</span>
        <div style={{display:'flex',gap:6}}>
          <Button size="sm" variant="primary" onClick={saveFile}><Icon name="save" size={12}/>Save</Button>
          <Button size="sm" variant="ghost" onClick={()=>setEditFile(null)}><Icon name="x" size={12}/>Close</Button>
        </div>
      </div>
      <textarea value={editContent} onChange={e=>setEditContent(e.target.value)} spellCheck={false} style={{width:'100%',minHeight:380,background:'var(--bg-surface)',border:'1px solid var(--border-subtle)',borderTop:'none',borderRadius:'0 0 12px 12px',color:'var(--text-primary)',fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.65,padding:14,resize:'vertical',outline:'none',tabSize:2}}/>
    </div>}
  </div>;
}

/* ═══════════════════════════════════════════
   CONFIGURATION VIEW
   ═══════════════════════════════════════════ */
function ConfigView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [props,setProps]=useState({});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!sid)return;
    setLoading(true);
    $a('/properties','GET',null,sid).then(d=>{if(d&&d.properties)setProps(d.properties);setLoading(false)}).catch(()=>setLoading(false));
  },[sid]);

  function updateProp(k,v){setProps(prev=>({...prev,[k]:v}))}

  async function saveProps(){
    try{const r=await $a('/properties','POST',{properties:props},sid);addToast(r&&r.success?'Saved':'Failed',r&&r.success?'success':'error')}
    catch(e){addToast('Failed','error')}
  }

  const entries=Object.entries(props).sort((a,b)=>a[0].localeCompare(b[0]));

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
      <Button variant="primary" onClick={saveProps}><Icon name="save" size={14}/>Save Properties</Button>
    </div>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="sliders-horizontal" size={14}/>server.properties</span>
      </div>
      <div style={{overflowX:'auto'}}>
        {loading?<div style={{padding:20}}><Spinner size={24}/></div>:
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          {entries.map(([k,v],i)=><tr key={k} style={{borderBottom:'1px solid var(--border-subtle)'}}>
            <td style={{padding:'9px 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'#06b6d4',fontWeight:600,width:260,whiteSpace:'nowrap',verticalAlign:'middle'}}>{escHtml(k)}</td>
            <td style={{padding:'9px 14px',verticalAlign:'middle'}}><input value={v||''} onChange={e=>updateProp(k,e.target.value)} style={{width:'100%',padding:'8px 10px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:6,color:'var(--text-primary)',fontFamily:"'JetBrains Mono',monospace",fontSize:11.5,outline:'none'}}/></td>
          </tr>)}
        </table>}
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   PLAYERS VIEW
   ═══════════════════════════════════════════ */
function PlayersView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [players,setPlayers]=useState([]);
  const [ops,setOps]=useState([]);
  const [banned,setBanned]=useState([]);
  const [modalAction,setModalAction]=useState(null);
  const [modalInput,setModalInput]=useState('');

  useEffect(()=>{
    if(!sid)return;
    $a('/players','GET',null,sid).then(d=>setPlayers(d.players||d||[])).catch(()=>{});
    $a('/ops','GET',null,sid).then(d=>setOps(d.ops||[])).catch(()=>{});
    $a('/banned','GET',null,sid).then(d=>setBanned(d.banned||[])).catch(()=>{});
  },[sid]);

  async function playerAction(action,player,extra){
    try{
      const body={player,...extra};
      const r=await $a('/'+action,'POST',body,sid);
      addToast(r&&r.success?r.message:'Failed',r&&r.success?'success':'error');
    }catch(e){addToast('Failed','error')}
    refresh();
  }

  function refresh(){
    $a('/players','GET',null,sid).then(d=>setPlayers(d.players||d||[])).catch(()=>{});
    $a('/ops','GET',null,sid).then(d=>setOps(d.ops||[])).catch(()=>{});
    $a('/banned','GET',null,sid).then(d=>setBanned(d.banned||[])).catch(()=>{});
  }

  function openActionModal(action,prefill){
    setModalAction(action);setModalInput(prefill||'');
  }

  function confirmAction(){
    if(!modalInput.trim()){addToast('Enter a name','error');return}
    playerAction(modalAction,modalInput.trim());
    setModalAction(null);setModalInput('');
  }

  const actionBtns=[
    {action:'kick',label:'Kick',variant:'ghost',icon:'user-minus'},
    {action:'ban',label:'Ban',variant:'danger',icon:'shield-ban'},
    {action:'unban',label:'Unban',variant:'success',icon:'shield-check'},
    {action:'op',label:'Op',variant:'warning',icon:'crown'},
    {action:'deop',label:'Deop',variant:'ghost',icon:'crown'},
  ];

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
      {actionBtns.map(b=><Button key={b.action} size="sm" variant={b.variant} onClick={()=>openActionModal(b.action)}><Icon name={b.icon} size={12}/>{b.label}</Button>)}
    </div>

    <Card style={{marginBottom:14}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="users-round" size={14}/>Online Players</span>
        <Button size="sm" variant="ghost" onClick={refresh}><Icon name="refresh-cw" size={12}/></Button>
      </div>
      <div style={{padding:16}}>
        {!players.length?<EmptyState icon="user-x" message="No players online"/>:
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
          {players.map((p,i)=>{
            const name=typeof p==='string'?p:(p.name||'');
            return <div key={i} style={{background:'var(--bg-overlay)',border:'1px solid var(--border-subtle)',borderRadius:8,padding:14,display:'flex',alignItems:'center',gap:12}}>
              <img src={playerAvatarUrl(name)} onError={e=>{e.target.style.display='none'}} style={{width:38,height:38,borderRadius:8,objectFit:'cover'}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600}}>{escHtml(name)}</div><div style={{fontSize:11,color:'var(--success)',display:'flex',alignItems:'center',gap:4,marginTop:2}}><span style={{width:5,height:5,borderRadius:'50%',background:'var(--success)'}}></span>Online</div></div>
            </div>;
          })}
        </div>}
      </div>
    </Card>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:12}}>
      <Card>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="crown" size={14}/>Operators</span>
        </div>
        <div style={{padding:14}}>
          {!ops.length?<EmptyState message="No operators"/>:
          ops.map((o,i)=>{const n=typeof o==='string'?o:(o.name||o);return <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'var(--bg-overlay)',borderRadius:6,fontSize:12,marginBottom:6}}>
            <span style={{fontWeight:500}}>{escHtml(n)}</span>
            <Button size="sm" variant="danger" onClick={()=>playerAction('deop',n)}>Remove</Button>
          </div>})}
        </div>
      </Card>
      <Card>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="shield-ban" size={14}/>Banned</span>
        </div>
        <div style={{padding:14}}>
          {!banned.length?<EmptyState message="No banned players"/>:
          banned.map((b,i)=>{const n=typeof b==='string'?b:(b.name||b);return <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'var(--bg-overlay)',borderRadius:6,fontSize:12,marginBottom:6}}>
            <span style={{fontWeight:500}}>{escHtml(n)}</span>
            <Button size="sm" variant="success" onClick={()=>playerAction('unban',n)}>Unban</Button>
          </div>})}
        </div>
      </Card>
    </div>

    {modalAction&&<Modal title={modalAction.charAt(0).toUpperCase()+modalAction.slice(1)+' Player'} description="Enter player name." onClose={()=>setModalAction(null)}>
      <input value={modalInput} onChange={e=>setModalInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')confirmAction()}} placeholder="Player name..." style={{width:'100%',padding:'9px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12,marginBottom:12,outline:'none'}} autoFocus/>
      <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
        <Button variant="ghost" onClick={()=>setModalAction(null)}>Cancel</Button>
        <Button variant="primary" onClick={confirmAction}>Confirm</Button>
      </div>
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════
   PLUGINS VIEW
   ═══════════════════════════════════════════ */
function PluginsView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [plugins,setPlugins]=useState([]);
  const uploadRef=useRef();

  useEffect(()=>{
    if(!sid)return;
    $a('/plugins','GET',null,sid).then(d=>setPlugins(d.plugins||[])).catch(()=>{});
  },[sid]);

  async function deletePlugin(name){
    if(!confirm('Delete "'+name+'"?\nServer restart required.'))return;
    try{const r=await $a('/plugins/delete','POST',{name},sid);addToast(r&&r.success?'Deleted':'Failed',r&&r.success?'success':'error');$a('/plugins','GET',null,sid).then(d=>setPlugins(d.plugins||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
  }

  async function uploadPlugin(inp){
    if(!inp.files.length)return;
    for(let i=0;i<inp.files.length;i++){
      const f=inp.files[i];
      if(!f.name.endsWith('.jar')){addToast('Only .jar files','error');continue}
      addToast('Uploading '+f.name+'...','info');
      const fd=new FormData();fd.append('file',f);fd.append('path','/plugins');
      try{const r=await $upload('/file/upload',fd,sid);const d=await r.json();addToast(d.success?'Uploaded':'Failed',d.success?'success':'error')}
      catch(e){addToast('Upload failed','error')}
    }
    inp.value='';$a('/plugins','GET',null,sid).then(d=>setPlugins(d.plugins||[])).catch(()=>{});
  }

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <Button variant="primary" onClick={()=>uploadRef.current&&uploadRef.current.click()}><Icon name="upload" size={14}/>Upload Plugin</Button>
      <input ref={uploadRef} type="file" accept=".jar" style={{display:'none'}} onChange={e=>uploadPlugin(e.target)}/>
    </div>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="puzzle" size={14}/>Installed Plugins</span>
        <span style={{fontSize:11,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace"}}>{plugins.length} plugin{plugins.length!==1?'s':''}</span>
      </div>
      <div style={{overflowX:'auto'}}>
        {!plugins.length?<EmptyState icon="package" message="No plugins installed"/>:
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Name</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Version</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left',width:80}}>Actions</th>
          </tr></thead>
          <tbody>
            {plugins.map((p,i)=><tr key={i} style={{borderBottom:'1px solid var(--border-subtle)'}}>
              <td style={{padding:'8px 14px',fontSize:12,verticalAlign:'middle'}}>
                <div style={{display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:28,height:28,borderRadius:6,display:'grid',placeItems:center,background:'rgba(239,68,68,0.15)'}}><Icon name="package" size={13} style={{color:'#ef4444'}}/></div>
                  <span style={{fontWeight:500}}>{escHtml(p.name)}</span>
                </div>
              </td>
              <td style={{padding:'8px 14px',fontSize:11,color:'var(--text-tertiary)'}}>{escHtml(p.version||'')}</td>
              <td style={{padding:'8px 14px'}}><Button size="sm" variant="danger" onClick={()=>deletePlugin(p.name)}><Icon name="trash-2" size={12}/></Button></td>
            </tr>)}
          </tbody>
        </table>}
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   MARKETPLACE VIEW
   ═══════════════════════════════════════════ */
function MarketplaceView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);

  useEffect(()=>{
    if(!sid)return;
    setLoading(true);
    $a('/marketplace/featured','GET',null,sid).then(d=>{setResults(d.results||d.hits||d.plugins||[]);setLoading(false);setSearched(true)}).catch(()=>{setLoading(false)});
  },[sid]);

  function doSearch(){
    if(!query.trim()){addToast('Enter a query','error');return}
    setLoading(true);
    $a('/marketplace/search?query='+encodeURIComponent(query.trim()),'GET',null,sid).then(d=>{setResults(d.results||d.hits||d.plugins||[]);setLoading(false);setSearched(true)}).catch(()=>setLoading(false));
  }

  async function installPlugin(slug,title){
    addToast('Installing '+title+'...','info');
    try{
      const vd=await $a('/marketplace/versions?slug='+encodeURIComponent(slug),'GET',null,sid);
      if(!vd||!vd.versions||!vd.versions.length){addToast('No versions found','error');return}
      const ver=vd.versions[0];
      const jarUrl=ver.url;const jarName=slug+'-'+(ver.version||'latest')+'.jar';
      const resp=await fetch(jarUrl);
      if(!resp.ok)throw new Error('Download failed');
      const blob=await resp.blob();
      const fd=new FormData();fd.append('file',blob,jarName);fd.append('path','/plugins/');
      const ur=await $upload('/file/upload',fd,sid);
      addToast('Plugin installed! Restart to apply.','success');
    }catch(e){addToast('Install failed: '+e.message,'error')}
  }

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doSearch()}} placeholder="Search Modrinth plugins..." style={{flex:1,padding:'10px 14px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:13,outline:'none'}}/>
      <Button variant="primary" onClick={doSearch}><Icon name="search" size={14}/>Search</Button>
    </div>
    {loading?<div style={{padding:40,textAlign:'center'}}><Spinner size={32}/><p style={{color:'var(--text-tertiary)',marginTop:12}}>Loading...</p></div>:
    !results.length&&searched?<EmptyState icon="search" message="No results found"/>:
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
      {results.map((p,i)=>(
        <Card key={i}>
          <div style={{padding:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:8,overflow:'hidden',background:'var(--bg-input)',flexShrink:0}}>
                {p.icon_url?<img src={p.icon_url} onError={e=>{e.target.style.display='none'}} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Icon name="package" size={20} style={{color:'var(--text-tertiary)'}}/>}
              </div>
              <div><div style={{fontSize:13,fontWeight:600}}>{escHtml(p.title||p.name)}</div><div style={{fontSize:11,color:'var(--text-tertiary)'}}>by {escHtml(p.author||'Unknown')}</div></div>
            </div>
            <div style={{fontSize:11,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:10,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{escHtml(p.description||'')}</div>
            <div style={{display:'flex',gap:12,fontSize:10,color:'var(--text-tertiary)',marginBottom:10}}>
              {p.download_count&&<span style={{display:'flex',alignItems:'center',gap:3}}><Icon name="download" size={11}/>{formatNum(p.download_count)}</span>}
            </div>
            <Button size="sm" variant="primary" onClick={()=>installPlugin(p.slug||p.name,p.title||p.name)}><Icon name="download" size={12}/>Install</Button>
          </div>
        </Card>
      ))}
    </div>}
  </div>;
}

/* ═══════════════════════════════════════════
   SCHEDULES VIEW
   ═══════════════════════════════════════════ */
function SchedulesView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [schedules,setSchedules]=useState([]);
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({name:'',command:'',interval_minutes:5});

  useEffect(()=>{
    if(!sid)return;
    $a('/schedules','GET',null,sid).then(d=>setSchedules(d.schedules||[])).catch(()=>{});
  },[sid]);

  async function createSchedule(){
    if(!form.name.trim()||!form.command.trim()){addToast('Name and command required','error');return}
    setShowCreate(false);
    try{const r=await $a('/schedules','POST',{name:form.name.trim(),command:form.command.trim(),interval_minutes:parseInt(form.interval_minutes)||5,enabled:true},sid);addToast(r&&r.success?'Created':'Failed',r&&r.success?'success':'error');$a('/schedules','GET',null,sid).then(d=>setSchedules(d.schedules||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
    setForm({name:'',command:'',interval_minutes:5});
  }

  async function toggleSchedule(name){
    try{await $a('/schedules/toggle','POST',{name},sid);addToast('Toggled','success');$a('/schedules','GET',null,sid).then(d=>setSchedules(d.schedules||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
  }

  async function deleteSchedule(name){
    if(!confirm('Delete "'+name+'"?'))return;
    try{await $a('/schedules/delete','POST',{name},sid);addToast('Deleted','success');$a('/schedules','GET',null,sid).then(d=>setSchedules(d.schedules||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
  }

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <Button variant="primary" onClick={()=>setShowCreate(true)}><Icon name="plus" size={14}/>Add Task</Button>
    </div>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="calendar-clock" size={14}/>Scheduled Tasks</span>
        <span style={{fontSize:11,color:'var(--text-tertiary)'}}>{schedules.length} tasks</span>
      </div>
      <div style={{overflowX:'auto'}}>
        {!schedules.length?<EmptyState icon="calendar-clock" message="No scheduled tasks"/>:
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Name</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Command</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Interval</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Status</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Actions</th>
          </tr></thead>
          <tbody>
            {schedules.map((s,i)=><tr key={i} style={{borderBottom:'1px solid var(--border-subtle)'}}>
              <td style={{padding:'8px 14px',fontSize:12,fontWeight:500}}>{escHtml(s.name)}</td>
              <td style={{padding:'8px 14px',fontSize:11,color:'var(--text-secondary)',fontFamily:"'JetBrains Mono',monospace"}}>{escHtml(s.command)}</td>
              <td style={{padding:'8px 14px',fontSize:11,color:'var(--text-tertiary)'}}>{s.interval_minutes||Math.round((s.interval_seconds||300)/60)}m</td>
              <td style={{padding:'8px 14px'}}><Toggle checked={s.enabled} onChange={()=>toggleSchedule(s.name)}/></td>
              <td style={{padding:'8px 14px'}}><Button size="sm" variant="danger" onClick={()=>deleteSchedule(s.name)}><Icon name="trash-2" size={12}/></Button></td>
            </tr>)}
          </tbody>
        </table>}
      </div>
    </Card>

    {showCreate&&<Modal title="Add Scheduled Task" description="Create a new task that runs commands automatically." onClose={()=>setShowCreate(false)}>
      <Input label="Task Name" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Task name..."/>
      <Input label="Command" value={form.command} onChange={v=>setForm({...form,command:v})} placeholder="Server command..."/>
      <Input label="Interval (minutes)" value={String(form.interval_minutes)} onChange={v=>setForm({...form,interval_minutes:parseInt(v)||5})} placeholder="5"/>
      <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
        <Button variant="ghost" onClick={()=>setShowCreate(false)}>Cancel</Button>
        <Button variant="primary" onClick={createSchedule}>Create</Button>
      </div>
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════
   LOGS VIEW
   ═══════════════════════════════════════════ */
function LogsView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [search,setSearch]=useState('');
  const [lines,setLines]=useState(200);
  const [logs,setLogs]=useState([]);
  const [total,setTotal]=useState(0);
  const [autoRefresh,setAutoRefresh]=useState(false);
  const bodyRef=useRef();

  const loadLogs=useCallback(async()=>{
    if(!sid)return;
    try{
      const d=await $a('/logs?search='+encodeURIComponent(search)+'&lines='+lines,'GET',null,sid);
      if(d){setLogs(d.lines||[]);setTotal(d.total||0)}
    }catch(e){}
  },[sid,search,lines]);

  useEffect(()=>{loadLogs()},[loadLogs]);

  useEffect(()=>{
    if(!autoRefresh)return;
    const iv=setInterval(loadLogs,5000);
    return ()=>clearInterval(iv);
  },[autoRefresh,loadLogs]);

  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight},[logs]);

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')loadLogs()}} placeholder="Search logs..." style={{flex:1,minWidth:180,padding:'8px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12,outline:'none'}}/>
      <select value={lines} onChange={e=>setLines(Number(e.target.value))} style={{padding:'8px 10px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12,cursor:'pointer'}}>
        {[50,100,200,500].map(n=><option key={n} value={n}>{n} lines</option>)}
      </select>
      <Button size="sm" variant={autoRefresh?'success':'ghost'} onClick={()=>{setAutoRefresh(!autoRefresh)}}><Icon name="refresh-cw" size={12}/>{autoRefresh?'Auto On':'Auto'}</Button>
    </div>
    <div style={{fontSize:11,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>Showing {total} lines{search?' matching "'+search+'"':''}</div>
    <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
      <div ref={bodyRef} style={{maxHeight:'calc(100dvh - 280px)',overflowY:'auto',padding:14,fontFamily:"'JetBrains Mono',monospace",fontSize:11,lineHeight:1.75,whiteSpace:'pre-wrap',wordBreak:'break-all',color:'var(--text-secondary)'}}>
        {logs.length?logs.map((l,i)=><div key={i}>{escHtml(l)}</div>):<div>No matching log entries found.</div>}
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   SERVER INFO VIEW
   ═══════════════════════════════════════════ */
function ServerInfoView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [info,setInfo]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!sid)return;
    setLoading(true);
    $a('/server-info','GET',null,sid).then(d=>{setInfo(d);setLoading(false)}).catch(()=>setLoading(false));
  },[sid]);

  if(loading)return <div style={{padding:40,textAlign:'center'}}><Spinner size={32}/></div>;
  if(!info)return <EmptyState icon="info" message="Could not load server info"/>;

  const cards=[
    {label:'Server Version',value:info.server_version||'Unknown',icon:'box'},
    {label:'Server Address',value:(info.ip||'?')+':'+(info.port||'?'),icon:'globe'},
    {label:'Max Players',value:info.max_players||'-',icon:'users'},
    {label:'Online Mode',value:info.online_mode==='true'?'Enabled':'Disabled',icon:'shield-check'},
    {label:'MOTD',value:info.motd||'-',icon:'message-square'},
    {label:'View Distance',value:(info.view_distance||'-')+' chunks',icon:'eye'},
    {label:'World Size',value:(info.world_sizes&&info.world_sizes.world)||'N/A',icon:'hard-drive'},
    {label:'Nether Size',value:(info.world_sizes&&info.world_sizes.world_nether)||'N/A',icon:'hard-drive'},
    {label:'End Size',value:(info.world_sizes&&info.world_sizes.world_the_end)||'N/A',icon:'hard-drive'},
  ];

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <Button variant="ghost" onClick={()=>{$a('/server-info','GET',null,sid).then(d=>setInfo(d)).catch(()=>{})}}><Icon name="refresh-cw" size={14}/>Refresh</Button>
    </div>
    <div className="stagger" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
      {cards.map((c,i)=><Card key={i} style={{padding:14}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
          <Icon name={c.icon} size={12} style={{color:'var(--text-tertiary)'}}/>{c.label}
        </div>
        <div style={{fontSize:13,fontWeight:600,wordBreak:'break-all',fontFamily:c.label.includes('Address')||c.label.includes('Size')?"'JetBrains Mono',monospace":'inherit',fontSize:c.label.includes('Address')||c.label.includes('Size')?12:13}}>{escHtml(String(c.value))}</div>
      </Card>)}
    </div>
    {info.plugins&&info.plugins.length>0&&<Card style={{marginTop:16}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="puzzle" size={14}/>Installed Plugins</span>
        <span style={{fontSize:11,color:'var(--text-tertiary)'}}>{info.plugin_count||info.plugins.length}</span>
      </div>
      <div style={{padding:16,display:'flex',flexWrap:'wrap',gap:6}}>
        {info.plugins.map((p,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',background:'var(--bg-input)',border:'1px solid var(--border-subtle)',borderRadius:20,fontSize:11,color:'var(--text-secondary)'}}><Icon name="puzzle" size={11}/>{escHtml(p)}</span>)}
      </div>
    </Card>}
  </div>;
}

/* ═══════════════════════════════════════════
   ALERTS VIEW
   ═══════════════════════════════════════════ */
function AlertsView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [alerts,setAlerts]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!sid)return;
    setLoading(true);
    $a('/alert-history','GET',null,sid).then(d=>{setAlerts(d.alerts||d.entries||[]);setLoading(false)}).catch(()=>setLoading(false));
  },[sid]);

  if(loading)return <div style={{padding:40,textAlign:'center'}}><Spinner size={32}/></div>;
  if(!alerts.length)return <EmptyState icon="bell-off" message="No alerts"/>;

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="bell" size={14}/>Alert History</span>
      </div>
      <div style={{padding:16}}>
        {alerts.map((a,i)=>{
          let iconCls='info';let iconName='info';
          if(a.level==='warning'||a.level==='warn'){iconCls='warning';iconName='alert-triangle'}
          else if(a.level==='error'||a.level==='critical'){iconCls='error';iconName='alert-circle'}
          const colors={info:{bg:'rgba(59,130,246,0.15)',color:'#3b82f6'},warning:{bg:'rgba(245,158,11,0.15)',color:'#f59e0b'},error:{bg:'rgba(239,68,68,0.15)',color:'#ef4444'}};
          const c=colors[iconCls]||colors.info;
          return <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border-subtle)'}}>
            <div style={{width:28,height:28,borderRadius:6,display:'grid',placeItems:center,flexShrink:0,background:c.bg}}><Icon name={iconName} size={13} style={{color:c.color}}/></div>
            <div style={{flex:1,fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>
              <strong style={{color:'var(--text-primary)'}}>{escHtml(a.title||a.type||'Alert')}</strong>
              <br/><span style={{fontSize:11,color:'var(--text-tertiary)'}}>{escHtml(a.message||a.description||'')}</span>
            </div>
            <div style={{fontSize:10,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap'}}>{escHtml(a.timestamp||a.created_at||'')}</div>
          </div>;
        })}
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   USERS VIEW
   ═══════════════════════════════════════════ */
function UsersView(){
  const {addToast}=useApp();
  const [users,setUsers]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({username:'',password:'',role:'viewer'});
  const [showRole,setShowRole]=useState(null);

  useEffect(()=>{
    if(!isAdmin())return;
    $a('/users','GET').then(d=>setUsers(d.users||[])).catch(()=>{});
  },[]);

  async function addUser(){
    if(!form.username.trim()||!form.password){addToast('Username and password required','error');return}
    setShowAdd(false);
    try{const r=await $a('/users','POST',{username:form.username.trim(),password:form.password,role:form.role});addToast(r&&r.success?'Created':'Failed',r&&r.success?'success':'error');$a('/users','GET').then(d=>setUsers(d.users||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
    setForm({username:'',password:'',role:'viewer'});
  }

  async function changeRole(username,role){
    setShowRole(null);
    try{const r=await $a('/users/'+encodeURIComponent(username)+'/role','PUT',{role});addToast(r&&r.success?'Updated':'Failed',r&&r.success?'success':'error');$a('/users','GET').then(d=>setUsers(d.users||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
  }

  async function deleteUser(username){
    if(!confirm('Delete user "'+username+'"?'))return;
    try{const r=await $a('/users/'+encodeURIComponent(username),'DELETE');addToast(r&&r.success?'Deleted':'Failed',r&&r.success?'success':'error');$a('/users','GET').then(d=>setUsers(d.users||[])).catch(()=>{})}
    catch(e){addToast('Failed','error')}
  }

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <Button variant="primary" onClick={()=>setShowAdd(true)}><Icon name="user-plus" size={14}/>Add User</Button>
    </div>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="users" size={14}/>Panel Users</span>
        <span style={{fontSize:11,color:'var(--text-tertiary)'}}>{users.length} users</span>
      </div>
      <div style={{overflowX:'auto'}}>
        {!users.length?<EmptyState icon="users" message="No users"/>:
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:500}}>
          <thead><tr>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Username</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Role</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left'}}>Last Login</th>
            <th style={{padding:'9px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-tertiary)',textAlign:'left',width:160}}>Actions</th>
          </tr></thead>
          <tbody>
            {users.map((u,i)=><tr key={i} style={{borderBottom:'1px solid var(--border-subtle)'}}>
              <td style={{padding:'10px 14px',fontSize:12,fontWeight:500}}>{escHtml(u.username)}</td>
              <td style={{padding:'10px 14px'}}><Badge variant={['owner','admin'].includes(u.role)?'default':u.role==='mod'?'warning':'info'}>{u.role||'viewer'}</Badge></td>
              <td style={{padding:'10px 14px',fontSize:11,color:'var(--text-tertiary)'}}>{escHtml(u.last_login||'-')}</td>
              <td style={{padding:'10px 14px',display:'flex',gap:4}}>
                <Button size="sm" variant="ghost" onClick={()=>setShowRole(u)}><Icon name="shield" size={12}/>Role</Button>
                <Button size="sm" variant="danger" onClick={()=>deleteUser(u.username)}><Icon name="trash-2" size={12}/></Button>
              </td>
            </tr>)}
          </tbody>
        </table>}
      </div>
    </Card>

    {showAdd&&<Modal title="Add User" description="Create a new panel user account." onClose={()=>setShowAdd(false)}>
      <Input label="Username" value={form.username} onChange={v=>setForm({...form,username:v})} placeholder="Username..."/>
      <Input label="Password" type="password" value={form.password} onChange={v=>setForm({...form,password:v})} placeholder="Password..."/>
      <div style={{marginBottom:12}}>
        <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--text-secondary)',marginBottom:4}}>Role</label>
        <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} style={{width:'100%',padding:'9px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12}}>
          <option value="viewer">Viewer</option><option value="mod">Moderator</option><option value="admin">Admin</option>
        </select>
      </div>
      <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
        <Button variant="ghost" onClick={()=>setShowAdd(false)}>Cancel</Button>
        <Button variant="primary" onClick={addUser}>Create User</Button>
      </div>
    </Modal>}

    {showRole&&<Modal title="Change Role" description={'Change role for '+showRole.username+'.'} onClose={()=>setShowRole(null)}>
      <div style={{marginBottom:12}}>
        <select defaultValue={showRole.role||'viewer'} onChange={e=>changeRole(showRole.username,e.target.value)} style={{width:'100%',padding:'9px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12}}>
          <option value="viewer">Viewer</option><option value="mod">Moderator</option><option value="admin">Admin</option>
        </select>
      </div>
      <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
        <Button variant="ghost" onClick={()=>setShowRole(null)}>Cancel</Button>
      </div>
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════
   AUDIT LOG VIEW
   ═══════════════════════════════════════════ */
function AuditView(){
  const {addToast}=useApp();
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!isAdmin())return;
    setLoading(true);
    $a('/audit-log','GET').then(d=>{setEntries(d.entries||d.logs||[]);setLoading(false)}).catch(()=>setLoading(false));
  },[]);

  if(loading)return <div style={{padding:40,textAlign:'center'}}><Spinner size={32}/></div>;
  if(!entries.length)return <EmptyState icon="file-search" message="No audit entries"/>;

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="file-search" size={14}/>Audit Log</span>
      </div>
      <div style={{padding:16}}>
        {entries.map((e,i)=>{
          const action=e.action||e.type||'unknown';
          let iconBg='rgba(59,130,246,0.15)',iconColor='#3b82f6',iconName='info';
          if(action.includes('delete')||action.includes('remove')||action.includes('ban')){iconBg='rgba(239,68,68,0.15)';iconColor='#ef4444';iconName='trash-2'}
          else if(action.includes('create')||action.includes('add')||action.includes('start')){iconBg='rgba(16,185,129,0.15)';iconColor='#10b981';iconName='plus'}
          else if(action.includes('update')||action.includes('edit')){iconBg='rgba(245,158,11,0.15)';iconColor='#f59e0b';iconName='pencil'}
          return <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border-subtle)'}}>
            <div style={{width:28,height:28,borderRadius:6,display:'grid',placeItems:center,flexShrink:0,background:iconBg}}><Icon name={iconName} size={13} style={{color:iconColor}}/></div>
            <div style={{flex:1,fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>
              <strong style={{color:'var(--text-primary)'}}>{escHtml(e.user||e.username||'System')}</strong> {escHtml(e.description||e.message||action)}
              {e.details&&<><br/><span style={{fontSize:10,color:'var(--text-tertiary)'}}>{escHtml(e.details)}</span></>}
            </div>
            <div style={{fontSize:10,color:'var(--text-tertiary)',fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap'}}>{escHtml(e.timestamp||e.created_at||'')}</div>
          </div>;
        })}
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   WORLD MAP VIEW
   ═══════════════════════════════════════════ */
function WorldMapView(){
  const [mapUrl,setMapUrl]=useState('');
  const [loaded,setLoaded]=useState(false);

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <Card>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6}}><Icon name="map" size={14}/>Live World Map</span>
      </div>
      <div style={{padding:16}}>
        {!loaded?
          <div style={{height:'calc(100dvh - 240px)',borderRadius:8,background:'var(--bg-surface)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
            <Icon name="map" size={48} style={{opacity:0.25}}/>
            <p style={{fontSize:13,color:'var(--text-tertiary)'}}>World Map</p>
            <p style={{fontSize:11,color:'var(--text-tertiary)'}}>Install BlueMap or SquareMap and configure it</p>
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <input value={mapUrl} onChange={e=>setMapUrl(e.target.value)} placeholder="Map URL (e.g. http://localhost:8100)" style={{maxWidth:280,padding:'9px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12,outline:'none'}}/>
              <Button size="sm" variant="primary" onClick={()=>setLoaded(true)}>Connect</Button>
            </div>
          </div>:
          <iframe src={mapUrl} style={{width:'100%',height:'calc(100dvh - 240px)',border:'none',borderRadius:8}}></iframe>
        }
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function AppContent(){
  const {currentPage,setStatus}=useApp();
  const views={dash:DashboardView,analytics:AnalyticsView,con:ConsoleView,files:FilesView,props:ConfigView,players:PlayersView,plugins:PluginsView,market:MarketplaceView,sched:SchedulesView,logs:LogsView,info:ServerInfoView,alerts:AlertsView,users:UsersView,audit:AuditView,map:WorldMapView};
  const Page=views[currentPage]||DashboardView;

  useEffect(()=>{
    const handler=e=>{const s=e.detail;if(s)setStatus(s)};
    window.addEventListener('status-update',handler);
    return ()=>window.removeEventListener('status-update',handler);
  },[]);

  useEffect(()=>{
    const handler=e=>{
      const action=e.detail;
      if(!action)return;
      const sid=null;
      import('react').then(({useState})=>{});
      const tk=getToken();if(!tk)return;
      fetch(API_BASE+'/api/'+action,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tk}}).then(r=>r.json()).catch(()=>{});
    };
    window.addEventListener('server-action',handler);
    return ()=>window.removeEventListener('server-action',handler);
  },[]);

  return <div className="main-w">
    <Sidebar/>
    <Header/>
    <main style={{flex:1,padding:16,overflowY:'auto'}}>
      <Page/>
    </main>
    <BottomNav/>
    <CommandPalette/>
    <ToastContainer/>
  </div>;
}

function App(){
  const [authed,setAuthed]=useState(!!getToken());

  if(!authed)return <LoginPage/>;

  return <AppProvider>
    <AppContent/>
  </AppProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
