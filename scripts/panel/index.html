<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NovaPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
<script crossorigin src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg-base:#050507;--bg-surface:#0c0c10;--bg-elevated:#141419;--bg-overlay:#1a1a22;--bg-input:#1e1e28;--border-subtle:rgba(255,255,255,0.06);--border-default:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.15);--text-primary:#f0f0f5;--text-secondary:#8b8b9e;--text-tertiary:#55556a;--accent:#8b5cf6;--accent-hover:#a78bfa;--accent-muted:rgba(139,92,246,0.12);--accent-glow:rgba(139,92,246,0.25);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--gradient-1:linear-gradient(135deg,#8b5cf6,#06b6d4);--gradient-2:linear-gradient(135deg,#8b5cf6,#ec4899);--gradient-3:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
*{-webkit-tap-highlight-color:transparent}
button,input,textarea,select{-webkit-appearance:none;appearance:none;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
::selection{background:rgba(139,92,246,0.3);color:#fff}
:focus-visible{box-shadow:0 0 0 2px var(--accent);border-radius:4px}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes meshMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cmdIn{from{opacity:0;transform:translateY(-8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.gradient-mesh{background:linear-gradient(-45deg,#0c0c10,#1a0a2e,#0a1628,#0c0c10,#1e0a28);background-size:400% 400%;animation:meshMove 15s ease infinite}
.glass{background:rgba(20,20,25,0.7);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06)}
.glow{box-shadow:0 0 20px rgba(139,92,246,0.15),0 0 60px rgba(139,92,246,0.05)}
.stagger>*{animation:fadeInUp 0.4s ease backwards}
.stagger>*:nth-child(1){animation-delay:0.05s}
.stagger>*:nth-child(2){animation-delay:0.1s}
.stagger>*:nth-child(3){animation-delay:0.15s}
.stagger>*:nth-child(4){animation-delay:0.2s}
.stagger>*:nth-child(5){animation-delay:0.25s}
.stagger>*:nth-child(6){animation-delay:0.3s}
.stagger>*:nth-child(7){animation-delay:0.35s}
.stagger>*:nth-child(8){animation-delay:0.4s}
.skeleton{background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-overlay) 50%,var(--bg-elevated) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.sidebar-w{width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.main-w{flex:1;display:flex;flex-direction:column;min-height:100dvh}
@media(min-width:1024px){.main-w{margin-left:240px}}
@media(max-width:1023px){.sidebar-w{transform:translateX(-100%)}.sidebar-w.open{transform:translateX(0)}.shade-overlay{display:block}}
@media(min-width:1024px){.shade-overlay{display:none!important}}
@media(max-width:639px){.bottom-nav-bar{display:flex!important}}
@media(min-width:640px){.bottom-nav-bar{display:none!important}}
@media(max-width:639px){.main-w{padding-bottom:64px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="root">
  <div id="preact-load" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;flex-direction:column;gap:16px">
    <div style="width:32px;height:32px;border:3px solid rgba(139,92,246,0.2);border-top-color:#8b5cf6;border-radius:50%;animation:spin 1s linear infinite"></div>
    <span style="color:#8b8b9e;font-size:13px;font-family:Inter,system-ui,sans-serif">Loading NovaPanel...</span>
  </div>
</div>
<noscript><div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;color:#8b8b9e;font-size:14px">JavaScript is required to use NovaPanel.</div></noscript>
<script>
var html = htm.bind(React.createElement);
var useState = React.useState;
var useEffect = React.useEffect;
var useContext = React.useContext;
var createContext = React.createContext;
var useRef = React.useRef;
var useCallback = React.useCallback;
var useMemo = React.useMemo;
var Fragment = React.Fragment;

/* API LAYER */
var API_BASE = 'https://wings.projectxglory.qzz.io';

function getToken() { return localStorage.getItem('mcpanel_token') || sessionStorage.getItem('mcpanel_token') || null; }
function setToken(t) { (localStorage.getItem('mcpanel_remember') === '1' ? localStorage : sessionStorage).setItem('mcpanel_token', t); }
function clearToken() { localStorage.removeItem('mcpanel_token'); sessionStorage.removeItem('mcpanel_token'); }
function setUser(u) { (localStorage.getItem('mcpanel_remember') === '1' ? localStorage : sessionStorage).setItem('mcpanel_user', JSON.stringify(u)); }
function getUser() { try { return JSON.parse(localStorage.getItem('mcpanel_user') || sessionStorage.getItem('mcpanel_user') || 'null'); } catch(e) { return null; } }
function clearUser() { localStorage.removeItem('mcpanel_user'); sessionStorage.removeItem('mcpanel_user'); }
function isAdmin() { var u = getUser(); return u && (u.role === 'owner' || u.role === 'admin'); }
function isOwner() { var u = getUser(); return u && u.role === 'owner'; }
function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function playerAvatarUrl(name) { return 'https://crafatar.com/avatars/' + encodeURIComponent(name) + '?size=32&overlay'; }
function formatSize(b) { if (!b) return '0 B'; var u = ['B','KB','MB','GB']; var i = Math.floor(Math.log(b) / Math.log(1024)); return (b / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + u[i]; }
function formatNum(n) { if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'; return String(n); }

async function $a(path, method, body, serverId) {
  method = method || 'GET';
  try {
    var tk = getToken();
    var o = { method: method, headers: {} };
    if (tk) o.headers['Authorization'] = 'Bearer ' + tk;
    if (body) { o.headers['Content-Type'] = 'application/json'; o.body = JSON.stringify(body); }
    var url = path;
    var sid = serverId || null;
    if (sid && path.charAt(0) === '/') {
      var skip = ['/servers/', '/auth/', '/users/', '/marketplace/'];
      var isSkip = false;
      for (var i = 0; i < skip.length; i++) { if (path.indexOf(skip[i]) === 0) { isSkip = true; break; } }
      if (!isSkip) url = '/servers/' + sid + path;
    }
    var r = await fetch(API_BASE + '/api' + url, o);
    if (r.status === 401) return null;
    if (!r.ok) { var e = await r.json().catch(function() { return {}; }); throw new Error(e.message || 'Request failed'); }
    return await r.json();
  } catch(e) { throw e; }
}

async function $upload(url, fd, serverId) {
  var tk = getToken();
  var h = {};
  if (tk) h['Authorization'] = 'Bearer ' + tk;
  var finalUrl = url;
  var sid = serverId || null;
  if (sid && url.charAt(0) === '/') {
    var skip = ['/auth/', '/users/', '/servers/'];
    var isSkip = false;
    for (var i = 0; i < skip.length; i++) { if (url.indexOf(skip[i]) === 0) { isSkip = true; break; } }
    if (!isSkip) finalUrl = '/servers/' + sid + url;
  }
  return fetch(API_BASE + '/api' + finalUrl, { method: 'POST', body: fd, headers: h });
}

/* APP CONTEXT */
var AppContext = createContext();

function AppProvider(props) {
  var children = props.children;
  var _user = useState(getUser()); var user = _user[0]; var setUserState = _user[1];
  var _token = useState(getToken()); var token = _token[0]; var setTokenState = _token[1];
  var _servers = useState([]); var servers = _servers[0]; var setServers = _servers[1];
  var _currentServer = useState(null); var currentServer = _currentServer[0]; var setCurrentServer = _currentServer[1];
  var _currentPage = useState('dash'); var currentPage = _currentPage[0]; var setCurrentPage = _currentPage[1];
  var _sidebarOpen = useState(false); var sidebarOpen = _sidebarOpen[0]; var setSidebarOpen = _sidebarOpen[1];
  var _toasts = useState([]); var toasts = _toasts[0]; var setToasts = _toasts[1];
  var _cmdPalette = useState(false); var cmdPalette = _cmdPalette[0]; var setCmdPalette = _cmdPalette[1];
  var _modal = useState(null); var modal = _modal[0]; var setModal = _modal[1];
  var _loading = useState({}); var loading = _loading[0]; var setLoading = _loading[1];
  var _status = useState(null); var status = _status[0]; var setStatus = _status[1];

  var addToast = useCallback(function(message, type) {
    type = type || 'info';
    var id = Date.now() + Math.random();
    setToasts(function(prev) { return prev.concat([{ id: id, message: message, type: type }]); });
    setTimeout(function() { setToasts(function(prev) { return prev.filter(function(t) { return t.id !== id; }); }); }, 4000);
  }, []);

  var logout = useCallback(function() {
    clearToken(); clearUser();
    setUserState(null); setTokenState(null);
    setCurrentServer(null);
  }, []);

  var fetchServers = useCallback(function() {
    $a('/servers', 'GET', null, null).then(function(d) {
      if (d && d.servers) {
        setServers(d.servers);
        if (!currentServer && d.servers.length > 0) setCurrentServer(d.servers[0]);
      }
    }).catch(function() {});
  }, [currentServer]);

  var value = useMemo(function() {
    return {
      user: user, token: token, servers: servers, currentServer: currentServer,
      currentPage: currentPage, sidebarOpen: sidebarOpen, toasts: toasts,
      cmdPalette: cmdPalette, modal: modal, loading: loading, status: status,
      setUserState: setUserState, setTokenState: setTokenState, setServers: setServers,
      setCurrentServer: setCurrentServer, setCurrentPage: setCurrentPage, setSidebarOpen: setSidebarOpen,
      setCmdPalette: setCmdPalette, setModal: setModal, setLoading: setLoading, setStatus: setStatus,
      addToast: addToast, logout: logout, fetchServers: fetchServers
    };
  }, [user, token, servers, currentServer, currentPage, sidebarOpen, toasts, cmdPalette, modal, loading, status, addToast, logout, fetchServers]);

  return html`<${AppContext.Provider} value=${value}>${children}<//>`;
}

function useApp() { return useContext(AppContext); }

/* ICON HELPER */
function Icon(props) {
  var name = props.name; var size = props.size || 16; var className = props.className || ''; var style = props.style || {};
  var ref = useRef(null);
  useEffect(function() {
    if (ref.current) {
      ref.current.innerHTML = '';
      var i = document.createElement('i');
      i.setAttribute('data-lucide', name);
      if (size) { i.style.width = size + 'px'; i.style.height = size + 'px'; }
      i.style.display = 'inline-block';
      i.style.flexShrink = '0';
      if (className) i.className = className;
      ref.current.appendChild(i);
      lucide.createIcons({ nodes: [i] });
    }
  }, [name, size, className]);
  return html`<span ref=${ref} style=${Object.assign({ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }, style)}></span>`;
}

/* TOAST CONTAINER */
function ToastContainer() {
  var ref = useApp(); var toasts = ref.toasts;
  return html`<div style=${{ position: 'fixed', bottom: 20, right: 20, zIndex: 9999, display: 'flex', flexDirection: 'column-reverse', gap: 6, pointerEvents: 'none', maxWidth: '90vw' }}>
    ${toasts.map(function(t) {
      var icons = { success: 'check-circle', error: 'alert-circle', info: 'info', warning: 'alert-triangle' };
      var colors = { success: '#10b981', error: '#ef4444', info: '#8b5cf6', warning: '#f59e0b' };
      return html`<div key=${t.id} class="glass" style=${{ pointerEvents: 'auto', padding: '10px 14px', minWidth: 240, maxWidth: 360, borderRadius: 10, display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, fontWeight: 500, animation: 'slideUp 0.25s ease', boxShadow: '0 8px 30px rgba(0,0,0,0.4)' }}>
        <${Icon} name=${icons[t.type] || 'info'} size=${16} style=${{ color: colors[t.type] || colors.info }} />
        <span style=${{ flex: 1, color: 'var(--text-primary)' }}>${t.message}</span>
      </div>`;
    })}
  </div>`;
}

/* SPINNER */
function Spinner(props) {
  var size = props.size || 16; var className = props.className || '';
  var st = props.style || {};
  return html`<span class=${className} style=${Object.assign({ display: 'inline-block', width: size, height: size, border: '3px solid rgba(255,255,255,0.15)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite' }, st)}></span>`;
}

/* SKELETON */
function Skeleton(props) {
  var w = props.w || '100%'; var h = props.h || 16; var r = props.r || 6;
  return html`<div class="skeleton" style=${{ width: w, height: h, borderRadius: r }}></div>`;
}

/* BUTTON */
function Button(props) {
  var children = props.children; var variant = props.variant || 'default'; var sz = props.size || 'md';
  var loading = props.loading; var disabled = props.disabled; var onClick = props.onClick;
  var className = props.className || ''; var style = props.style || {}; var title = props.title;
  var variants = {
    default: { background: 'transparent', border: '1px solid var(--border-default)', color: 'var(--text-primary)' },
    primary: { background: 'var(--accent)', border: '1px solid var(--accent)', color: '#fff' },
    success: { background: 'var(--success)', border: '1px solid var(--success)', color: '#fff' },
    danger: { background: 'var(--danger)', border: '1px solid var(--danger)', color: '#fff' },
    warning: { background: 'var(--warning)', border: '1px solid var(--warning)', color: '#000' },
    ghost: { background: 'transparent', border: '1px solid rgba(255,255,255,0.08)', color: 'var(--text-secondary)' }
  };
  var v = variants[variant] || variants.default;
  var s = Object.assign({
    display: 'inline-flex', alignItems: 'center', gap: 5,
    padding: sz === 'sm' ? '6px 10px' : sz === 'lg' ? '10px 20px' : '8px 14px',
    fontSize: sz === 'sm' ? 11 : 13, fontWeight: 600, borderRadius: 8,
    cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap', lineHeight: 1.4
  }, v, { opacity: (disabled || loading) ? 0.55 : 1, pointerEvents: (disabled || loading) ? 'none' : 'auto' }, style);
  return html`<button onClick=${onClick} disabled=${disabled || loading} style=${s} class=${className} title=${title}>
    ${loading && html`<${Spinner} size=${12} />`}
    ${children}
  </button>`;
}

/* INPUT */
function Input(props) {
  var label = props.label; var value = props.value; var onChange = props.onChange;
  var placeholder = props.placeholder; var type = props.type || 'text';
  var error = props.error; var style = props.style || {}; var inputStyle = props.inputStyle || {};
  var onKeyDown = props.onKeyDown;
  return html`<div style=${Object.assign({ width: '100%' }, style)}>
    ${label && html`<label style=${{ display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4, letterSpacing: '0.3px' }}>${label}</label>`}
    <input type=${type} value=${value || ''} onChange=${function(e) { if (onChange) onChange(e.target.value); }} onKeyDown=${onKeyDown} placeholder=${placeholder} style=${Object.assign({ width: '100%', padding: '9px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-default)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 12, outline: 'none', transition: 'all 0.15s' }, inputStyle)} />
    ${error && html`<div style=${{ fontSize: 10, color: 'var(--danger)', marginTop: 3 }}>${error}</div>`}
  </div>`;
}

/* MODAL */
function Modal(props) {
  var title = props.title; var description = props.description; var children = props.children; var onClose = props.onClose;
  var bgRef = useRef(null);
  useEffect(function() {
    var handler = function(e) { if (e.key === 'Escape' && onClose) onClose(); };
    document.addEventListener('keydown', handler);
    return function() { document.removeEventListener('keydown', handler); };
  }, [onClose]);
  return html`<div ref=${bgRef} onClick=${function(e) { if (e.target === bgRef.current && onClose) onClose(); }} style=${{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 9000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, animation: 'fadeIn 0.15s ease' }}>
    <div class="glass" style=${{ padding: 24, width: '100%', maxWidth: 420, maxHeight: '90vh', overflowY: 'auto', borderRadius: 12, animation: 'modalIn 0.2s ease', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
      ${title && html`<h3 style=${{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.3px', marginBottom: 4 }}>${title}</h3>`}
      ${description && html`<p style=${{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 14 }}>${description}</p>`}
      ${children}
    </div>
  </div>`;
}

/* CARD */
function Card(props) {
  var children = props.children; var hover = props.hover !== false; var className = props.className || ''; var style = props.style || {};
  var baseStyle = Object.assign({ background: 'var(--bg-elevated)', border: '1px solid var(--border-subtle)', borderRadius: 12, overflow: 'hidden', transition: 'all 0.2s' }, style);
  if (!hover) {
    return html`<div class=${className} style=${baseStyle}>${children}</div>`;
  }
  return html`<div class=${className} style=${baseStyle} onMouseEnter=${function(e) { e.currentTarget.style.borderColor = 'var(--border-default)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 30px rgba(0,0,0,0.4)'; }} onMouseLeave=${function(e) { e.currentTarget.style.borderColor = 'var(--border-subtle)'; e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}>${children}</div>`;
}

/* BADGE */
function Badge(props) {
  var children = props.children; var variant = props.variant || 'default';
  var colors = {
    default: { background: 'rgba(139,92,246,0.15)', color: '#a78bfa' },
    success: { background: 'rgba(16,185,129,0.15)', color: '#10b981' },
    danger: { background: 'rgba(239,68,68,0.15)', color: '#ef4444' },
    warning: { background: 'rgba(245,158,11,0.15)', color: '#f59e0b' },
    info: { background: 'rgba(59,130,246,0.15)', color: '#3b82f6' }
  };
  var c = colors[variant] || colors.default;
  return html`<span style=${Object.assign({ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 6, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.5px' }, c)}>${children}</span>`;
}

/* STAT CARD */
function StatCard(props) {
  var label = props.label; var value = props.value; var hint = props.hint;
  var icon = props.icon; var iconBg = props.iconBg; var barValue = props.barValue; var barColor = props.barColor;
  return html`<${Card} style=${{ padding: 16 }}>
    <div style=${{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
      <span style=${{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.6px', color: 'var(--text-tertiary)' }}>${label}</span>
      <div style=${{ width: 28, height: 28, borderRadius: 8, display: 'grid', placeItems: 'center', background: iconBg || 'var(--accent-muted)' }}><${Icon} name=${icon} size=${14} style=${{ color: 'var(--accent)' }} /></div>
    </div>
    <div style=${{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.3px', lineHeight: 1.2, fontFamily: 'Inter,sans-serif' }}>${value}</div>
    ${hint && html`<div style=${{ fontSize: 10, color: 'var(--text-tertiary)', marginTop: 2 }}>${hint}</div>`}
    ${barValue !== undefined && html`<div style=${{ height: 3, background: 'var(--bg-input)', borderRadius: 2, marginTop: 10, overflow: 'hidden' }}><div style=${{ height: '100%', borderRadius: 2, transition: 'width 0.5s ease', width: Math.min(barValue, 100) + '%', background: barColor || 'var(--accent)' }}></div></div>`}
  <//>`;
}

/* TOGGLE */
function Toggle(props) {
  var checked = props.checked; var onChange = props.onChange;
  return html`<button onClick=${function() { if (onChange) onChange(!checked); }} style=${{ position: 'relative', width: 36, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer', transition: 'all 0.2s', padding: 0, background: checked ? 'var(--accent)' : 'var(--text-tertiary)', flexShrink: 0 }}>
    <span style=${{ position: 'absolute', top: 2, left: checked ? 18 : 2, width: 16, height: 16, borderRadius: '50%', background: '#fff', transition: 'transform 0.15s', display: 'block' }}></span>
  </button>`;
}

/* EMPTY STATE */
function EmptyState(props) {
  var icon = props.icon || 'inbox'; var message = props.message || 'No data';
  return html`<div style=${{ textAlign: 'center', padding: '40px 20px', color: 'var(--text-tertiary)' }}>
    <${Icon} name=${icon} size=${36} style=${{ opacity: 0.25, marginBottom: 10 }} />
    <p style=${{ fontSize: 13 }}>${message}</p>
  </div>`;
}

/* SIDEBAR */
function Sidebar() {
  var app = useApp();

  var _query = useState(''); var query = _query[0]; var setQuery = _query[1];

      { type: 'action', label: 'Restart Server', icon: 'rotate-cw', action: function() { window.dispatchEvent(new CustomEvent('server-action', { detail: 'restart' })); } },
    ];
  }, [setCurrentPage]);

  var filtered = useMemo(function() {
    if (!query.trim()) return allItems;
    return allItems.filter(function(i) { return i.type !== 'sep' && i.label.toLowerCase().includes(query.toLowerCase()); });
  }, [query, allItems]);

  useEffect(function() {
    if (cmdPalette) { setQuery(''); setActiveIdx(-1); setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 100); }
  }, [cmdPalette]);

  useEffect(function() {
    var handler = function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setCmdPalette(!cmdPalette); }
      if (e.key === 'Escape' && cmdPalette) setCmdPalette(false);
    };
    document.addEventListener('keydown', handler);
    return function() { document.removeEventListener('keydown', handler); };
  }, [cmdPalette, setCmdPalette]);

  function handleKeyDown(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(function(p) { return Math.min(p + 1, filtered.filter(function(i) { return i.type !== 'sep'; }).length - 1); }); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(function(p) { return Math.max(p - 1, -1); }); }

      var items = filtered.filter(function(i) { return i.type !== 'sep'; });
      if (items[activeIdx]) { setCmdPalette(false); items[activeIdx].action(); }

  return html`<div onClick=${function() { setCmdPalette(false); }} style=${{ position: 'fixed', inset: 0, zIndex: 9500, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 'min(25vh,200px)', animation: 'fadeIn 0.1s ease' }}>

      </div>
      <div style=${{ overflowY: 'auto', maxHeight: 340, padding: 6 }}>
        ${filtered.map(function(item) {
          if (item.type === 'sep') return html`<div key=${item.label} style=${{ height: 1, background: 'var(--border-subtle)', margin: '4px 8px' }}></div>`;
          var idx = visibleIdx++;
          return html`<div key=${item.label} onClick=${function() { setCmdPalette(false); item.action(); }} onMouseEnter=${function() { setActiveIdx(idx); }} style=${{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8, cursor: 'pointer', transition: 'background 0.1s', color: 'var(--text-primary)', background: activeIdx === idx ? 'var(--accent-muted)' : 'transparent' }}>

            <span style=${{ fontSize: 11, color: 'var(--text-tertiary)', marginLeft: 'auto' }}>${item.type}</span>

      </div>
    </div>
  </div>`;
}

  var _password = useState(''); var password = _password[0]; var setPassword = _password[1];
  var _remember = useState(localStorage.getItem('mcpanel_remember') === '1'); var remember = _remember[0]; var setRemember = _remember[1];
  var _code = useState(''); var code = _code[0]; var setCode = _code[1];

  useEffect(function() { if (localStorage.getItem('mcpanel_remember') === '1') setRemember(true); }, []);

  async function doLogin() {
    if (!username || !password) { setError('Enter username and password'); return; }
    setError(''); setLoading(true);
    try {
      var r = await fetch(API_BASE + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username, password: password }) });
      var d = await r.json();
      if (d.success && d.token) {
        localStorage.setItem('mcpanel_remember', remember ? '1' : '0');
        setToken(d.token);
        if (d.user) setUser(d.user);
        if (d.requires_2fa) { setStep(2); setLoading(false); return; }

        <label onClick=${function() { setRemember(!remember); }} style=${{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', marginBottom: 16, justifyContent: 'center' }}>

      <div style=${{ marginBottom: 12 }}>
        <select defaultValue=${showRole.role || 'viewer'} onChange=${function(e) { changeRole(showRole.username, e.target.value); }} style=${{ width: '100%', padding: '9px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-default)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 12 }}>
          <option value="viewer">Viewer</option><option value="mod">Moderator</option><option value="admin">Admin</option>
        </select>
      </div>
      <div style=${{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
        <${Button} variant="ghost" onClick=${function() { setShowRole(null); }}>Cancel<//>
      </div>
    <//>`}
  </div>`;
}

/* AUDIT LOG VIEW */
function AuditView() {
  var app = useApp();
  var addToast = app.addToast;
  var _entries = useState([]); var entries = _entries[0]; var setEntries = _entries[1];
  var _isLoading = useState(true); var isLoading = _isLoading[0]; var setLoading = _isLoading[1];

  useEffect(function() {
    if (!isAdmin()) return;
    setLoading(true);
    $a('/audit-log', 'GET').then(function(d) { setEntries(d.entries || d.logs || []); setLoading(false); }).catch(function() { setLoading(false); });
  }, []);

  if (isLoading) return html`<div style=${{ padding: 40, textAlign: 'center' }}><${Spinner} size=${32} /></div>`;
  if (!entries.length) return html`<${EmptyState} icon="file-search" message="No audit entries" />`;

  return html`<div style=${{ animation: 'fadeInUp 0.3s ease' }}>
    <${Card}>
      <div style=${{ padding: '12px 16px', borderBottom: '1px solid var(--border-subtle)' }}>
        <span style=${{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}><${Icon} name="file-search" size=${14} />Audit Log</span>
      </div>
      <div style=${{ padding: 16 }}>
        ${entries.map(function(e, i) {
          var action = e.action || e.type || 'unknown';
          var iconBg = 'rgba(59,130,246,0.15)'; var iconColor = '#3b82f6'; var iconName = 'info';
          if (action.indexOf('delete') >= 0 || action.indexOf('remove') >= 0 || action.indexOf('ban') >= 0) { iconBg = 'rgba(239,68,68,0.15)'; iconColor = '#ef4444'; iconName = 'trash-2'; }
          else if (action.indexOf('create') >= 0 || action.indexOf('add') >= 0 || action.indexOf('start') >= 0) { iconBg = 'rgba(16,185,129,0.15)'; iconColor = '#10b981'; iconName = 'plus'; }
          else if (action.indexOf('update') >= 0 || action.indexOf('edit') >= 0) { iconBg = 'rgba(245,158,11,0.15)'; iconColor = '#f59e0b'; iconName = 'pencil'; }
          return html`<div key=${i} style=${{ display: 'flex', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--border-subtle)' }}>
            <div style=${{ width: 28, height: 28, borderRadius: 6, display: 'grid', placeItems: 'center', flexShrink: 0, background: iconBg }}><${Icon} name=${iconName} size=${13} style=${{ color: iconColor }} /></div>
            <div style=${{ flex: 1, fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.5 }}>
              <strong style=${{ color: 'var(--text-primary)' }}>${escHtml(e.user || e.username || 'System')}</strong> ${escHtml(e.description || e.message || action)}
              ${e.details && html`<br /><span style=${{ fontSize: 10, color: 'var(--text-tertiary)' }}>${escHtml(e.details)}</span>`}
            </div>
            <div style=${{ fontSize: 10, color: 'var(--text-tertiary)', fontFamily: "'JetBrains Mono',monospace", whiteSpace: 'nowrap' }}>${escHtml(e.timestamp || e.created_at || '')}</div>
          </div>`;
        })}
      </div>
    <//>
  </div>`;
}

/* WORLD MAP VIEW */
function WorldMapView() {
  var _mapUrl = useState(''); var mapUrl = _mapUrl[0]; var setMapUrl = _mapUrl[1];
  var _loaded = useState(false); var loaded = _loaded[0]; var setLoaded = _loaded[1];

  return html`<div style=${{ animation: 'fadeInUp 0.3s ease' }}>
    <${Card}>
      <div style=${{ padding: '12px 16px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style=${{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}><${Icon} name="map" size=${14} />Live World Map</span>
      </div>
      <div style=${{ padding: 16 }}>
        ${!loaded ?
          html`<div style=${{ height: 'calc(100dvh - 240px)', borderRadius: 8, background: 'var(--bg-surface)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
            <${Icon} name="map" size=${48} style=${{ opacity: 0.25 }} />

            <div style=${{ display: 'flex', gap: 6, marginTop: 8 }}>
              <input value=${mapUrl} onChange=${function(e) { setMapUrl(e.target.value); }} placeholder="Map URL (e.g. http://localhost:8100)" style=${{ maxWidth: 280, padding: '9px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-default)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 12, outline: 'none' }} />
              <${Button} size="sm" variant="primary" onClick=${function() { setLoaded(true); }}>Connect<//>
            </div>
          </div>` :
          html`<iframe src=${mapUrl} style=${{ width: '100%', height: 'calc(100dvh - 240px)', border: 'none', borderRadius: 8 }} />`}
      </div>
    <//>
  </div>`;
}

/* MAIN APP */
function AppContent() {
  var app = useApp();
  var token = app.token; var currentPage = app.currentPage; var setStatus = app.setStatus;
  var views = { dash: DashboardView, analytics: AnalyticsView, con: ConsoleView, files: FilesView, props: ConfigView, players: PlayersView, plugins: PluginsView, market: MarketplaceView, sched: SchedulesView, logs: LogsView, info: ServerInfoView, alerts: AlertsView, users: UsersView, audit: AuditView, map: WorldMapView };
  var Page = views[currentPage] || DashboardView;

  useEffect(function() {
    var handler = function(e) { var s = e.detail; if (s) setStatus(s); };
    window.addEventListener('status-update', handler);
    return function() { window.removeEventListener('status-update', handler); };
  }, []);

  useEffect(function() {
    var handler = function(e) {
      var action = e.detail;
      if (!action) return;
      var tk = getToken(); if (!tk) return;
      fetch(API_BASE + '/api/' + action, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tk } }).then(function(r) { return r.json(); }).catch(function() {});
    };
    window.addEventListener('server-action', handler);
    return function() { window.removeEventListener('server-action', handler); };
  }, []);

  if (!token) return html`<${LoginPage} />`;

  return html`<div class="main-w">
    <${Sidebar} />
    <${Header} />
    <main style=${{ flex: 1, padding: 16, overflowY: 'auto' }}>
      <${Page} />
    </main>
    <${BottomNav} />
    <${CommandPalette} />
    <${ToastContainer} />
  </div>`;
}

function App() {
  return html`<${AppProvider}>
    <${AppContent} />
  <//>`;
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  var ld = document.getElementById('preact-load');
  if (ld) ld.remove();
} catch(err) {
  document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;flex-direction:column;gap:12px;padding:20px"><div style="color:#ef4444;font-size:14px;font-family:monospace;white-space:pre-wrap;text-align:center;max-width:500px">Error: ' + err.message + '</div><button onclick="location.reload()" style="padding:8px 16px;background:#8b5cf6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">Retry</button></div>';
  console.error('NovaPanel render error:', err);
}
</script>
</body>
</html>
