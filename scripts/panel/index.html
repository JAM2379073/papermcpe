<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NovaPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg-base:#050507;--bg-surface:#0c0c10;--bg-elevated:#141419;--bg-overlay:#1a1a22;--bg-input:#1e1e28;--border-subtle:rgba(255,255,255,0.06);--border-default:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.15);--text-primary:#f0f0f5;--text-secondary:#8b8b9e;--text-tertiary:#55556a;--accent:#8b5cf6;--accent-hover:#a78bfa;--accent-muted:rgba(139,92,246,0.12);--accent-glow:rgba(139,92,246,0.25);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--gradient-1:linear-gradient(135deg,#8b5cf6,#06b6d4);--gradient-2:linear-gradient(135deg,#8b5cf6,#ec4899);--gradient-3:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
*{-webkit-tap-highlight-color:transparent}
button,input,textarea,select{-webkit-appearance:none;appearance:none;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
::selection{background:rgba(139,92,246,0.3);color:#fff}
:focus-visible{box-shadow:0 0 0 2px var(--accent);border-radius:4px}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes meshMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cmdIn{from{opacity:0;transform:translateY(-8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.gradient-mesh{background:linear-gradient(-45deg,#0c0c10,#1a0a2e,#0a1628,#0c0c10,#1e0a28);background-size:400% 400%;animation:meshMove 15s ease infinite}
.glass{background:rgba(20,20,25,0.7);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06)}
.glow{box-shadow:0 0 20px rgba(139,92,246,0.15),0 0 60px rgba(139,92,246,0.05)}
.stagger>*{animation:fadeInUp 0.4s ease backwards}
.stagger>*:nth-child(1){animation-delay:0.05s}
.stagger>*:nth-child(2){animation-delay:0.1s}
.stagger>*:nth-child(3){animation-delay:0.15s}
.stagger>*:nth-child(4){animation-delay:0.2s}
.stagger>*:nth-child(5){animation-delay:0.25s}
.stagger>*:nth-child(6){animation-delay:0.3s}
.stagger>*:nth-child(7){animation-delay:0.35s}
.stagger>*:nth-child(8){animation-delay:0.4s}
.skeleton{background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-overlay) 50%,var(--bg-elevated) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.sidebar-w{width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.main-w{flex:1;display:flex;flex-direction:column;min-height:100dvh}
@media(min-width:1024px){.main-w{margin-left:240px}}
@media(max-width:1023px){.sidebar-w{transform:translateX(-100%)}.sidebar-w.open{transform:translateX(0)}.shade-overlay{display:block}}
@media(min-width:1024px){.shade-overlay{display:none!important}}
@media(max-width:639px){.bottom-nav-bar{display:flex!important}}
@media(min-width:640px){.bottom-nav-bar{display:none!important}}
@media(max-width:639px){.main-w{padding-bottom:64px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useContext,useContext:useCtx,createContext,useRef,useCallback,useMemo,Fragment}=React;

/* ═══════════════════════════════════════════
   API LAYER
   ═══════════════════════════════════════════ */
const API_BASE='https://wings.projectxglory.qzz.io';

function getToken(){return localStorage.getItem('mcpanel_token')||sessionStorage.getItem('mcpanel_token')||null}
function setToken(t){(localStorage.getItem('mcpanel_remember')==='1'?localStorage:sessionStorage).setItem('mcpanel_token',t)}
function clearToken(){localStorage.removeItem('mcpanel_token');sessionStorage.removeItem('mcpanel_token')}
function setUser(u){(localStorage.getItem('mcpanel_remember')==='1'?localStorage:sessionStorage).setItem('mcpanel_user',JSON.stringify(u))}
function getUser(){try{return JSON.parse(localStorage.getItem('mcpanel_user')||sessionStorage.getItem('mcpanel_user')||'null')}catch{return null}}
function clearUser(){localStorage.removeItem('mcpanel_user');sessionStorage.removeItem('mcpanel_user')}
function isAdmin(){const u=getUser();return u&&(u.role==='owner'||u.role==='admin')}
function isOwner(){const u=getUser();return u&&u.role==='owner'}
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function playerAvatarUrl(name){return 'https://crafatar.com/avatars/'+encodeURIComponent(name)+'?size=32&overlay'}
function formatSize(b){if(!b)return '0 B';const u=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(1024));return(b/Math.pow(1024,i)).toFixed(i?1:0)+' '+u[i]}
function formatNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}

async function $a(path,method='GET',body=null,serverId){
  method=method||'GET';
  try{
    const tk=getToken();
    const o={method,headers:{}};
    if(tk)o.headers['Authorization']='Bearer '+tk;
    if(body){o.headers['Content-Type']='application/json';o.body=JSON.stringify(body)}
    let url=path;
    const sid=serverId||null;
    if(sid&&path.charAt(0)==='/'){
      const skip=['/servers/','/auth/','/users/','/marketplace/'];
      let isSkip=false;
      for(let i=0;i<skip.length;i++){if(path.indexOf(skip[i])===0){isSkip=true;break}}
      if(!isSkip)url='/servers/'+sid+path;
    }
    const r=await fetch(API_BASE+'/api'+url,o);
    if(r.status===401){return null}
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Request failed')}
    return await r.json();
  }catch(e){throw e}
}

async function $upload(url,fd,serverId){
  const tk=getToken();
  const h={};
  if(tk)h['Authorization']='Bearer '+tk;
  let finalUrl=url;
  const sid=serverId||null;
  if(sid&&url.charAt(0)==='/'){
    const skip=['/auth/','/users/','/servers/'];
    let isSkip=false;
    for(let i=0;i<skip.length;i++){if(url.indexOf(skip[i])===0){isSkip=true;break}}
    if(!isSkip)finalUrl='/servers/'+sid+url;
  }
  return fetch(API_BASE+'/api'+finalUrl,{method:'POST',body:fd,headers:h});
}

/* ═══════════════════════════════════════════
   APP CONTEXT
   ═══════════════════════════════════════════ */
const AppContext=createContext();

function AppProvider({children}){
  const [user,setUserState]=useState(getUser());
  const [token,setTokenState]=useState(getToken());
  const [servers,setServers]=useState([]);
  const [currentServer,setCurrentServer]=useState(null);
  const [currentPage,setCurrentPage]=useState('dash');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [cmdPalette,setCmdPalette]=useState(false);
  const [modal,setModal]=useState(null);
  const [loading,setLoading]=useState({});
  const [status,setStatus]=useState(null);

  const addToast=useCallback((message,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(prev=>[...prev,{id,message,type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),4000);
  },[]);

  const logout=useCallback(()=>{
    clearToken();clearUser();
    setUserState(null);setTokenState(null);
    setCurrentServer(null);
  },[]);

  const fetchServers=useCallback(async()=>{
    try{
      const d=await $a('/servers','GET',null,null);
      if(d&&d.servers){
        setServers(d.servers);
        if(!currentServer&&d.servers.length>0)setCurrentServer(d.servers[0]);
      }
    }catch(e){}
  },[currentServer]);

  const value=useMemo(()=>({
    user,token,servers,currentServer,currentPage,sidebarOpen,toasts,cmdPalette,modal,loading,status,
    setUserState,setTokenState,setServers,setCurrentServer,setCurrentPage,setSidebarOpen,setCmdPalette,setModal,setLoading,setStatus,
    addToast,logout,fetchServers
  }),[user,token,servers,currentServer,currentPage,sidebarOpen,toasts,cmdPalette,modal,loading,status,addToast,logout,fetchServers]);

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

function useApp(){return useContext(AppContext)}

/* ═══════════════════════════════════════════
   LUCIDE ICON HELPER
   ═══════════════════════════════════════════ */
function Icon({name,size=16,className='',style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){
      ref.current.innerHTML='';
      const i=document.createElement('i');
      i.setAttribute('data-lucide',name);
      if(size)i.style.width=size+'px';
      if(size)i.style.height=size+'px';
      i.style.display='inline-block';
      i.style.flexShrink='0';
      if(className)i.className=className;
      ref.current.appendChild(i);
      lucide.createIcons({nodes:[i]});
    }
  },[name,size,className]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',...style}}></span>;
}

/* ═══════════════════════════════════════════
   REUSABLE COMPONENTS
   ═══════════════════════════════════════════ */

/* Toast Container */
function ToastContainer(){
  const {toasts}=useApp();
  return <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column-reverse',gap:6,pointerEvents:'none',maxWidth:'90vw'}}>
    {toasts.map(t=>{
      const icons={success:'check-circle',error:'alert-circle',info:'info',warning:'alert-triangle'};
      const colors={success:'#10b981',error:'#ef4444',info:'#8b5cf6',warning:'#f59e0b'};
      return <div key={t.id} className="glass" style={{pointerEvents:'auto',padding:'10px 14px',minWidth:240,maxWidth:360,borderRadius:10,display:'flex',alignItems:'center',gap:8,fontSize:12,fontWeight:500,animation:'slideUp 0.25s ease',boxShadow:'0 8px 30px rgba(0,0,0,0.4)'}}>
        <Icon name={icons[t.type]||'info'} size={16} style={{color:colors[t.type]||colors.info}}/>
        <span style={{flex:1,color:'var(--text-primary)'}}>{t.message}</span>
      </div>;
    })}
  </div>;
}

/* Spinner */
function Spinner({size=16,className=''}){
  return <span className={className} style={{display:'inline-block',width:size,height:size,border:`3px solid rgba(255,255,255,0.15)`,borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 1s linear infinite'}}></span>;
}

/* Skeleton */
function Skeleton({w='100%',h=16,r=6}){
  return <div className="skeleton" style={{width:w,height:h,borderRadius:r}}></div>;
}

/* Button */
function Button({children,variant='default',size='md',loading,disabled,onClick,className='',style={},title}){
  const v={
    default:{background:'transparent',border:'1px solid var(--border-default)',color:'var(--text-primary)'},
    primary:{background:'var(--accent)',border:'1px solid var(--accent)',color:'#fff'},
    success:{background:'var(--success)',border:'1px solid var(--success)',color:'#fff'},
    danger:{background:'var(--danger)',border:'1px solid var(--danger)',color:'#fff'},
    warning:{background:'var(--warning)',border:'1px solid var(--warning)',color:'#000'},
    ghost:{background:'transparent',border:'1px solid rgba(255,255,255,0.08)',color:'var(--text-secondary)'},
  }[variant]||{background:'transparent',border:'1px solid var(--border-default)',color:'var(--text-primary)'};
  const s={display:'inline-flex',alignItems:'center',gap:5,padding:size==='sm'?'6px 10px':size==='lg'?'10px 20px':'8px 14px',fontSize:size==='sm'?11:13,fontWeight:600,borderRadius:8,cursor:'pointer',transition:'all 0.15s',whiteSpace:'nowrap',lineHeight:1.4,...v,opacity:(disabled||loading)?0.55:1,pointerEvents:(disabled||loading)?'none':'auto',...style};
  return <button onClick={onClick} disabled={disabled||loading} style={s} className={className} title={title}>
    {loading&&<Spinner size={12}/>}
    {children}
  </button>;
}

/* Input */
function Input({label,value,onChange,placeholder,type='text',error,style={},inputStyle={},onKeyDown}){
  return <div style={{width:'100%'}}>
    {label&&<label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--text-secondary)',marginBottom:4,letterSpacing:'0.3px'}}>{label}</label>}
    <input type={type} value={value||''} onChange={e=>onChange&&onChange(e.target.value)} onKeyDown={onKeyDown} placeholder={placeholder} style={{width:'100%',padding:'9px 12px',background:'var(--bg-input)',border:'1px solid var(--border-default)',borderRadius:8,color:'var(--text-primary)',fontSize:12,outline:'none',transition:'all 0.15s',...inputStyle}}/>
    {error&&<div style={{fontSize:10,color:'var(--danger)',marginTop:3}}>{error}</div>}
  </div>;
}

/* Modal */
function Modal({title,description,children,onClose}){
  const {modal,setModal}=useApp();
  const bgRef=useRef(null);
  useEffect(()=>{
    const handler=e=>{if(e.key==='Escape')onClose&&onClose()};
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[onClose]);
  if(!modal&&!title)return null;
  const m=modal||{title:title||'',description:description||''};
  return <div ref={bgRef} onClick={e=>{if(e.target===bgRef.current)onClose&&onClose()}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn 0.15s ease'}}>
    <div className="glass" style={{padding:24,width:'100%',maxWidth:420,maxHeight:'90vh',overflowY:'auto',borderRadius:12,animation:'modalIn 0.2s ease',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
      {m.title&&<h3 style={{fontSize:16,fontWeight:600,letterSpacing:'-0.3px',marginBottom:4}}>{m.title}</h3>}
      {m.description&&<p style={{fontSize:12,color:'var(--text-secondary)',marginBottom:14}}>{m.description}</p>}
      {children}
    </div>
  </div>;
}

/* Card */
function Card({children,hover=true,className='',style={}}){
  return <div className={className} style={{background:'var(--bg-elevated)',border:'1px solid var(--border-subtle)',borderRadius:12,overflow:'hidden',transition:'all 0.2s',...(hover?{}:{})}} {...(hover?{onMouseEnter:e=>{e.currentTarget.style.borderColor='var(--border-default)';e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 30px rgba(0,0,0,0.4)'},onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--border-subtle)';e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=''}}:{})} >{children}</div>;
}

/* Badge */
function Badge({children,variant='default'}){
  const colors={default:{background:'rgba(139,92,246,0.15)',color:'#a78bfa'},success:{background:'rgba(16,185,129,0.15)',color:'#10b981'},danger:{background:'rgba(239,68,68,0.15)',color:'#ef4444'},warning:{background:'rgba(245,158,11,0.15)',color:'#f59e0b'},info:{background:'rgba(59,130,246,0.15)',color:'#3b82f6'}};
  const c=colors[variant]||colors.default;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px',...c}}>{children}</span>;
}

/* StatCard */
function StatCard({label,value,hint,icon,iconBg,barValue,barColor}){
  return <Card style={{padding:16}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
      <span style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--text-tertiary)'}}>{label}</span>
      <div style={{width:28,height:28,borderRadius:8,display:'grid',placeItems:center,background:iconBg||'var(--accent-muted)'}}><Icon name={icon} size={14} style={{color:'var(--accent)'}}/></div>
    </div>
    <div style={{fontSize:18,fontWeight:600,letterSpacing:'-0.3px',lineHeight:1.2,fontFamily:'Inter,sans-serif'}}>{value}</div>
    {hint&&<div style={{fontSize:10,color:'var(--text-tertiary)',marginTop:2}}>{hint}</div>}
    {barValue!==undefined&&<div style={{height:3,background:'var(--bg-input)',borderRadius:2,marginTop:10,overflow:'hidden'}}><div style={{height:'100%',borderRadius:2,transition:'width 0.5s ease',width:Math.min(barValue,100)+'%',background:barColor||'var(--accent)'}}></div></div>}
  </Card>;
}

/* Toggle */
function Toggle({checked,onChange}){
  return <button onClick={()=>onChange&&onChange(!checked)} style={{position:'relative',width:36,height:24,borderRadius:12,border:'none',cursor:'pointer',transition:'all 0.2s',padding:0,background:checked?'var(--accent)':'var(--text-tertiary)',flexShrink:0}}>
    <span style={{position:'absolute',top:2,left:checked?18:2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'transform 0.15s',display:'block'}}></span>
  </button>;
}

/* Empty State */
function EmptyState({icon,message}){
  return <div style={{textAlign:'center',padding:40,20,color:'var(--text-tertiary)'}}>
    <Icon name={icon||'inbox'} size={36} style={{opacity:0.25,marginBottom:10}}/>
    <p style={{fontSize:13}}>{message||'No data'}</p>
  </div>;
}

/* ═══════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════ */
function Sidebar(){
  const {servers,currentServer,setCurrentServer,currentPage,setCurrentPage,sidebarOpen,setSidebarOpen,user,logout,status,addToast}=useApp();
  const admin=isAdmin();

  const navItems=[
    {section:'General',items:[
      {id:'dash',label:'Dashboard',icon:'layout-dashboard',shortcut:'⌘1'},
      {id:'analytics',label:'Analytics',icon:'bar-chart-2'},
      {id:'con',label:'Console',icon:'terminal',shortcut:'⌘2'},
    ]},
    {section:'Manage',items:[
      {id:'files',label:'Files',icon:'folder-open',shortcut:'⌘3'},
      {id:'props',label:'Configuration',icon:'sliders-horizontal'},
      {id:'players',label:'Players',icon:'users-round',shortcut:'⌘4'},
      {id:'plugins',label:'Plugins',icon:'puzzle'},
      {id:'market',label:'Marketplace',icon:'shopping-bag'},
      {id:'map',label:'World Map',icon:'map'},
    ]},
    {section:'Tools',items:[
      {id:'sched',label:'Schedules',icon:'calendar-clock'},
      {id:'logs',label:'Logs',icon:'scroll-text'},
      {id:'info',label:'Server Info',icon:'info'},
      {id:'alerts',label:'Alerts',icon:'bell'},
    ]},
    ...(admin?[{section:'Admin',items:[
      {id:'users',label:'Users',icon:'user-cog'},
      {id:'audit',label:'Audit Log',icon:'file-search'},
    ]}]:[])
  ];

  function go(id){setCurrentPage(id);setSidebarOpen(false)}
  function selSrv(s){setCurrentServer(s);addToast('Switched to '+s.name,'info');setSidebarOpen(false)}

  const roleColors={owner:'#a78bfa',admin:'#3b82f6',mod:'#f59e0b',viewer:'var(--text-tertiary)'};

  return <Fragment>
    {sidebarOpen&&<div className="shade-overlay" onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:90,animation:'fadeIn 0.2s ease'}}></div>}
    <aside className={"sidebar-w"+(sidebarOpen?' open':'')}>
      <div style={{padding:16,borderBottom:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,background:'var(--accent-muted)',borderRadius:8,display:'grid',placeItems:center,flexShrink:0}}>
          <Icon name="server" size={16} style={{color:'var(--accent)'}}/>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:600,letterSpacing:'-0.3px'}}>NovaPanel</div>
          <div style={{fontSize:10,color:'var(--text-tertiary)',marginTop:1}}>Server Manager</div>
        </div>
      </div>

      <nav style={{flex:1,padding:8,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
        {navItems.map(sec=><Fragment key={sec.section}>
          {sec.section!=='General'&&<div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:'var(--text-tertiary)',padding:'14px 10px 6px',userSelect:'none'}}>{sec.section}</div>}
          {sec.items.map(it=><button key={it.id} onClick={()=>go(it.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,fontSize:13,fontWeight:500,color:currentPage===it.id?'var(--text-primary)':'var(--text-secondary)',cursor:'pointer',transition:'all 0.15s',border:'none',background:currentPage===it.id?'var(--accent-muted)':'transparent',width:'100%',textAlign:'left',fontFamily:'inherit'}}>

/* ═══════════════════════════════════════════
   COMMAND PALETTE
   ═══════════════════════════════════════════ */
function CommandPalette(){
  const {cmdPalette,setCmdPalette,setCurrentPage,addToast}=useApp();
  const [query,setQuery]=useState('');
  const [activeIdx,setActiveIdx]=useState(-1);
  const inputRef=useRef(null);

  const allItems=useMemo(()=>[
    {type:'page',label:'Dashboard',icon:'layout-dashboard',action:()=>setCurrentPage('dash')},
    {type:'page',label:'Console',icon:'terminal',action:()=>setCurrentPage('con')},
    {type:'page',label:'Files',icon:'folder-open',action:()=>setCurrentPage('files')},
    {type:'page',label:'Configuration',icon:'sliders-horizontal',action:()=>setCurrentPage('props')},
    {type:'page',label:'Players',icon:'users-round',action:()=>setCurrentPage('players')},
    {type:'page',label:'Plugins',icon:'puzzle',action:()=>setCurrentPage('plugins')},
    {type:'page',label:'Marketplace',icon:'shopping-bag',action:()=>setCurrentPage('market')},
    {type:'page',label:'Analytics',icon:'bar-chart-2',action:()=>setCurrentPage('analytics')},
    {type:'page',label:'World Map',icon:'map',action:()=>setCurrentPage('map')},
    {type:'page',label:'Schedules',icon:'calendar-clock',action:()=>setCurrentPage('sched')},
    {type:'page',label:'Logs',icon:'scroll-text',action:()=>setCurrentPage('logs')},
    {type:'page',label:'Server Info',icon:'info',action:()=>setCurrentPage('info')},
    {type:'page',label:'Alerts',icon:'bell',action:()=>setCurrentPage('alerts')},
    {type:'sep',label:'Actions'},
    {type:'action',label:'Start Server',icon:'play',action:()=>{window.dispatchEvent(new CustomEvent('server-action',{detail:'start'}))}},
    {type:'action',label:'Stop Server',icon:'square',action:()=>{window.dispatchEvent(new CustomEvent('server-action',{detail:'stop'}))}},
    {type:'action',label:'Restart Server',icon:'rotate-cw',action:()=>{window.dispatchEvent(new CustomEvent('server-action',{detail:'restart'}))}},
  ],[setCurrentPage]);

  const filtered=useMemo(()=>{
    if(!query.trim())return allItems;
    return allItems.filter(i=>i.type!=='sep'&&i.label.toLowerCase().includes(query.toLowerCase()));
  },[query,allItems]);

  useEffect(()=>{
    if(cmdPalette){setQuery('');setActiveIdx(-1);setTimeout(()=>inputRef.current&&inputRef.current.focus(),100)}
  },[cmdPalette]);

  useEffect(()=>{
    const handler=e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setCmdPalette(!cmdPalette)}
      if(e.key==='Escape'&&cmdPalette)setCmdPalette(false);
    };
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[cmdPalette,setCmdPalette]);

  function handleKeyDown(e){
    if(e.key==='ArrowDown'){e.preventDefault();setActiveIdx(p=>Math.min(p+1,filtered.filter(i=>i.type!=='sep').length-1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setActiveIdx(p=>Math.max(p-1,-1))}
    else if(e.key==='Enter'){
      const items=filtered.filter(i=>i.type!=='sep');
      if(items[activeIdx]){setCmdPalette(false);items[activeIdx].action()}
    }
  }

  if(!cmdPalette)return null;
  let visibleIdx=0;

  return <div onClick={()=>setCmdPalette(false)} style={{position:'fixed',inset:0,zIndex:9500,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'min(25vh,200px)',animation:'fadeIn 0.1s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:560,background:'var(--bg-surface)',border:'1px solid var(--border-default)',borderRadius:12,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',overflow:'hidden',maxHeight:400,display:'flex',flexDirection:'column',animation:'cmdIn 0.15s ease',margin:'0 16px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:'1px solid var(--border-subtle)'}}>
        <Icon name="search" size={18} style={{color:'var(--text-tertiary)',flexShrink:0}}/>
        <input ref={inputRef} value={query} onChange={e=>{setQuery(e.target.value);setActiveIdx(-1)}} onKeyDown={handleKeyDown} placeholder="Type a command or search..." style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--text-primary)',fontSize:14,fontFamily:'inherit'}}/>
      </div>
      <div style={{overflowY:'auto',maxHeight:340,padding:6}}>
        {filtered.map(item=>{
          if(item.type==='sep')return <div key={item.label} style={{height:1,background:'var(--border-subtle)',margin:'4px 8px'}}></div>;
          const idx=visibleIdx++;
          return <div key={item.label} onClick={()=>{setCmdPalette(false);item.action()}} onMouseEnter={()=>setActiveIdx(idx)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,cursor:'pointer',transition:'background 0.1s',color:'var(--text-primary)',background:activeIdx===idx?'var(--accent-muted)':'transparent'}}>
            <Icon name={item.icon||'circle'} size={16} style={{color:'var(--text-tertiary)'}}/>
            <span style={{fontSize:13,fontWeight:500}}>{item.label}</span>
            <span style={{fontSize:11,color:'var(--text-tertiary)',marginLeft:'auto'}}>{item.type}</span>
          </div>;
        })}
        {filtered.filter(i=>i.type!=='sep').length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text-tertiary)',fontSize:12}}>No results found</div>}
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   LOGIN PAGE
   ═══════════════════════════════════════════ */
function LoginPage(){
  const {setUserState,fetchServers}=useApp();
  const [step,setStep]=useState(1);
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [remember,setRemember]=useState(localStorage.getItem('mcpanel_remember')==='1');
  const [code,setCode]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{if(localStorage.getItem('mcpanel_remember')==='1')setRemember(true)},[]);

  async function doLogin(){
    if(!username||!password){setError('Enter username and password');return}
    setError('');setLoading(true);
    try{
      const r=await fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const d=await r.json();
      if(d.success&&d.token){
        localStorage.setItem('mcpanel_remember',remember?'1':'0');
        setToken(d.token);
        if(d.user){setUser(d.user);setUserState(d.user)}
        if(d.requires_2fa){setStep(2);setLoading(false);return}
        fetchServers();
      }else{setError(d.message||'Invalid credentials')}
    }catch(e){setError('Connection failed')}
    setLoading(false);
  }

  async function verify2FA(){
    if(!code||code.length!==6){setError('Enter 6-digit code');return}
    setError('');setLoading(true);
    try{
      const r=await fetch(API_BASE+'/api/auth/verify-2fa',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},body:JSON.stringify({code})});
      const d=await r.json();
      if(d.success)fetchServers();else setError(d.message||'Invalid code');
    }catch(e){setError('Verification failed')}
    setLoading(false);
  }

  return <div className="gradient-mesh" style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:center',padding:20}}>
    <div className="glass glow" style={{padding:32,width:'100%',maxWidth:380,borderRadius:16,textAlign:'center',position:'relative',zIndex:1}}>
      <div style={{width:52,height:52,background:'var(--accent-muted)',borderRadius:12,display:'grid',placeItems:center,margin:'0 auto 16px'}}>
        <Icon name="server" size={24} style={{color:'var(--accent)'}}/>
      </div>
      <h2 style={{fontSize:20,fontWeight:600,letterSpacing:'-0.3px',marginBottom:4}}>NovaPanel</h2>
      <p style={{fontSize:12,color:'var(--text-secondary)',marginBottom:24}}>Minecraft Server Management</p>

      {step===1&&<Fragment>
        <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')document.getElementById('pw-input').focus()}} placeholder="Username" style={{width:'100%',padding:'12px 14px',background:'var(--bg-input)',border:'1px solid var(--border-subtle)',borderRadius:8,color:'var(--text-primary)',fontSize:13,outline:'none',marginBottom:12,transition:'all 0.15s'}}/>
        <input id="pw-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doLogin()}} placeholder="Password" style={{width:'100%',padding:'12px 14px',background:'var(--bg-input)',border:'1px solid var(--border-subtle)',borderRadius:8,color:'var(--text-primary)',fontSize:13,outline:'none',marginBottom:12,transition:'all 0.15s'}}/>
        <label onClick={()=>setRemember(!remember)} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginBottom:16,justifyContent:'center'}}>
          <div style={{width:16,height:16,borderRadius:4,border:'2px solid var(--border-default)',background:remember?'var(--accent-muted)':'transparent',display:'grid',placeItems:center,transition:'all 0.1s'}}>
            {remember&&<span style={{width:8,height:8,borderRadius:2,background:'var(--accent)',display:'block'}}></span>}
          </div>
          <span style={{fontSize:12,color:'var(--text-secondary)'}}>Remember me</span>
        </label>
        <button onClick={doLogin} disabled={loading} style={{width:'100%',padding:12,fontSize:13,fontWeight:600,borderRadius:8,cursor:'pointer',border:'none',background:'var(--accent)',color:'#fff',fontFamily:'inherit',transition:'all 0.15s',minHeight:44}}>
          {loading?<Spinner size={14} style={{borderTopColor:'#fff'}}/>:'Login'}
        </button>
        <div style={{fontSize:11,color:'var(--danger)',marginTop:8,minHeight:16}}>{error}</div>
      </Fragment>}

      {step===2&&<Fragment>
        <p style={{fontSize:12,color:'var(--text-tertiary)',marginBottom:16}}>Enter your 2FA code from Google Authenticator</p>
        <input value={code} onChange={e=>{if(e.target.value.length<=6)setCode(e.target.value.replace(/\D/g,''))}} onKeyDown={e=>{if(e.key==='Enter')verify2FA()}} placeholder="000000" maxLength={6} style={{width:'100%',padding:'11px 14px',background:'var(--bg-input)',border:'1px solid var(--border-subtle)',borderRadius:8,color:'var(--text-primary)',fontSize:24,letterSpacing:8,textAlign:'center',outline:'none',marginBottom:12,fontFamily:"'JetBrains Mono',monospace"}}/>
        <button onClick={verify2FA} disabled={loading} style={{width:'100%',padding:12,fontSize:13,fontWeight:600,borderRadius:8,cursor:'pointer',border:'none',background:'var(--accent)',color:'#fff',fontFamily:'inherit',transition:'all 0.15s',minHeight:44}}>
          {loading?<Spinner size={14} style={{borderTopColor:'#fff'}}/>:'Verify'}
        </button>
        <div style={{fontSize:11,color:'var(--danger)',marginTop:8,minHeight:16}}>{error}</div>
      </Fragment>}
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   DASHBOARD VIEW
   ═══════════════════════════════════════════ */
function DashboardView(){
  const {currentServer,addToast}=useApp();
  const sid=currentServer&&currentServer.id;
  const [stats,setStats]=useState(null);
  const [players,setPlayers]=useState({count:0});
  const [chartData,setChartData]=useState({cpu:[],ram:[],tps:[],labels:[]});
  const [backups,setBackups]=useState([]);
  const cpuRef=useRef();const ramRef=useRef();const tpsRef=useRef();
  const chartsRef=useRef({cpu:null,ram:null,tps:null});

  const loadStats=useCallback(async()=>{
    if(!sid)return;
    try{
      const s=await $a('/status','GET',null,sid);
      if(s){
        setStats(s);
        window.dispatchEvent(new CustomEvent('status-update',{detail:s}));
        setChartData(prev=>{
          const n=cpuRef.current?chartsRef.current.cpu:null;
          const now=new Date();
          const label=now.getMinutes()+':'+String(now.getSeconds()).padStart(2,'0');
          const d={...prev};
          d.labels=[...d.labels,label];d.cpu=[...d.cpu,s.cpu||0];d.ram=[...d.ram,s.ram_used||0];d.tps=[...d.tps,s.tps||20];
          if(d.labels.length>60){d.labels.shift();d.cpu.shift();d.ram.shift();d.tps.shift()}
          return d;
        });
      }
    }catch(e){}
  },[sid]);

  useEffect(()=>{
    loadStats();
    const iv=setInterval(loadStats,5000);
    return ()=>clearInterval(iv);
  },[loadStats]);

  useEffect(()=>{
    if(!sid)return;
    $a('/players','GET',null,sid).then(d=>d&&setPlayers(d)).catch(()=>{});
    $a('/backups','GET',null,sid).then(d=>d&&setBackups(d.backups||[])).catch(()=>{});
  },[sid]);

  useEffect(()=>{
    const gridColor='rgba(255,255,255,0.05)';
    const tickColor='#55556a';
    const baseOpts={responsive:true,maintainAspectRatio:false,animation:{duration:300},plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true,grid:{color:gridColor},ticks:{color:tickColor,font:{size:9,family:"'JetBrains Mono'"},maxTicksLimit:4}}},elements:{point:{radius:0},line:{tension:0.3,borderWidth:1.5}}};
    if(cpuRef.current&&!chartsRef.current.cpu){
      chartsRef.current.cpu=new Chart(cpuRef.current,{type:'line',data:{labels:chartData.labels,datasets:[{data:chartData.cpu,borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,0.08)',fill:true}]},options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,min:0,max:100}}}});
    }
    if(ramRef.current&&!chartsRef.current.ram){
      chartsRef.current.ram=new Chart(ramRef.current,{type:'line',data:{labels:chartData.labels,datasets:[{data:chartData.ram,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.08)',fill:true}]},options:baseOpts});
    }
    if(tpsRef.current&&!chartsRef.current.tps){
      chartsRef.current.tps=new Chart(tpsRef.current,{type:'line',data:{labels:chartData.labels,datasets:[{data:chartData.tps,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.08)',fill:true}]},options:baseOpts});
    }
    return()=>{
      if(chartsRef.current.cpu){chartsRef.current.cpu.destroy();chartsRef.current.cpu=null}
      if(chartsRef.current.ram){chartsRef.current.ram.destroy();chartsRef.current.ram=null}
      if(chartsRef.current.tps){chartsRef.current.tps.destroy();chartsRef.current.tps=null}
    };
  },[]);

  useEffect(()=>{
    if(chartsRef.current.cpu){chartsRef.current.cpu.data.labels=chartData.labels;chartsRef.current.cpu.data.datasets[0].data=chartData.cpu;chartsRef.current.cpu.update('none')}
    if(chartsRef.current.ram){chartsRef.current.ram.data.labels=chartData.labels;chartsRef.current.ram.data.datasets[0].data=chartData.ram;chartsRef.current.ram.update('none')}
    if(chartsRef.current.tps){chartsRef.current.tps.data.labels=chartData.labels;chartsRef.current.tps.data.datasets[0].data=chartData.tps;chartsRef.current.tps.update('none')}
  },[chartData]);

  const s=stats||{cpu:0,ram_used:0,ram_total:0,disk_used:0,disk_total:0,tps:20,uptime:'--',java_version:'-'};
  const rp=s.ram_total?(s.ram_used/s.ram_total*100):0;
  const dp=s.disk_total?(s.disk_used/s.disk_total*100):0;
  const tps=s.tps||20;

  async function doBackup(){
    addToast('Creating backup...','info');
    try{const r=await $a('/backup','POST',{},sid);addToast(r&&r.success?'Backup created':'Failed',r&&r.success?'success':'error')}
    catch(e){addToast('Backup failed','error')}
  }

  return <div style={{animation:'fadeInUp 0.3s ease'}}>
    <div className="stagger" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:16}}>
      <StatCard label="CPU" value={s.cpu+'%'} icon="cpu" iconBg="rgba(139,92,246,0.15)" barValue={s.cpu} barColor="#8b5cf6"/>
      <StatCard label="Memory" value={s.ram_used+' MB'} hint={'of '+s.ram_total+' MB'} icon="memory-stick" iconBg="rgba(16,185,129,0.15)" barValue={rp} barColor="#10b981"/>
      <StatCard label="Disk" value={s.disk_used+' GB'} hint={'of '+s.disk_total+' GB'} icon="hard-drive" iconBg="rgba(168,85,247,0.15)" barValue={dp} barColor="#a855f7"/>

      </div>
      <div style={{padding:16}}>
        {!backups.length?<EmptyState icon="archive" message="No backups found"/>:
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {backups.map((b,i)=><div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--bg-overlay)',borderRadius:8,fontSize:12}}>
            <span style={{fontWeight:500}}>{escHtml(b.name||b.filename)}</span>
            <span style={{color:'var(--text-tertiary)',fontSize:10}}>{escHtml(b.size||'')}</span>
          </div>)}
        </div>}
      </div>
    </Card>
  </div>;
}

/* ═══════════════════════════════════════════
   ANALYTICS VIEW
   ═══════════════════════════════════════════ */
function AnalyticsView(){
  const {currentServer}=useApp();
  const sid=currentServer&&currentServer.id;
  const [hours,setHours]=useState(24);
  const [data,setData]=useState(null);
  const perfRef=useRef();const playersRef=useRef();
  const chartsRef=useRef({perf:null,players:null});

  useEffect(()=>{
    if(!sid)return;
    $a('/analytics?hours='+hours,'GET',null,sid).then(d=>{if(d){setData(d);
      if(perfRef.current&&d.data_points){
        if(chartsRef.current.perf)chartsRef.current.perf.destroy();
        chartsRef.current.perf=new Chart(perfRef.current,{type:'line',data:{labels:d.data_points.map(p=>p.time||''),datasets:[
          {label:'CPU %',data:d.data_points.map(p=>p.cpu||0),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,0.08)',fill:true,tension:0.3},
          {label:'TPS',data:d.data_points.map(p=>p.tps||0),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.08)',fill:true,tension:0.3}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b8b9e',font:{size:10}}}},scales:{x:{display:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#55556a',font:{size:9},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#55556a',font:{size:9}}}},elements:{point:{radius:0},line:{borderWidth:1.5}}}});
      }
      if(playersRef.current&&d.data_points){
        if(chartsRef.current.players)chartsRef.current.players.destroy();
        chartsRef.current.players=new Chart(playersRef.current,{type:'line',data:{labels:d.data_points.map(p=>p.time||''),datasets:[{label:'Players',data:d.data_points.map(p=>p.players||0),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.15)',fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#55556a',font:{size:9},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#55556a',font:{size:9},stepSize:1}}},elements:{point:{radius:0},line:{borderWidth:1.5}}}});

    }}).catch(()=>{});

  useEffect(()=>()=>{if(chartsRef.current.perf)chartsRef.current.perf.destroy();if(chartsRef.current.players)chartsRef.current.players.destroy()},[]);

  return <div style={{animation:'fadeInUp 0.3s ease'}}>

      {[{v:6,l:'6h'},{v:24,l:'24h'},{v:72,l:'3d'},{v:168,l:'7d'}].map(o=><Button key={o.v} variant={hours===o.v?'primary':'ghost'} size="sm" onClick={()=>setHours(o.v)}>{o.l}</Button>)}
