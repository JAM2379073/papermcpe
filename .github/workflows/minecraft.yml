name: Minecraft Server Loop (Pterodactyl + NookTheme)

on:
  workflow_dispatch:
    inputs:
      deploy_pterodactyl:
        description: 'Deploy Pterodactyl Panel with NookTheme'
        required: false
        default: 'true'
        type: boolean

jobs:
  minecraft-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk-headless python3-pip screen jq openssl
          sudo update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-21-openjdk-amd64/bin/javac
          pip3 install huggingface_hub requests
          java -version

          # Install Docker Compose if not available
          if ! command -v docker compose &> /dev/null; then
              sudo apt-get install -y docker-compose-plugin
          fi
          docker compose version
          echo "✅ All dependencies installed!"

      - name: Cancel Previous Runs
        run: bash scripts/cancel-previous.sh
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}

      - name: Telegram - Server Starting
        run: bash scripts/telegram-notify.sh "starting"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_NUMBER: ${{ github.run_number }}

      - name: Download Backup from HuggingFace
        run: python3 scripts/backup-manager.py download
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}

      - name: Setup Minecraft Server
        run: bash scripts/setup-server.sh

      - name: Start Playit Tunnel
        run: bash scripts/tunnel-manager.sh start
        env:
          PLAYIT_SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}

      - name: Setup Pterodactyl Panel + NookTheme
        run: bash scripts/setup-panel.sh
        env:
          PANEL_PASSWORD: ${{ secrets.PANEL_PASSWORD }}
          PANEL_ADMIN_EMAIL: ${{ secrets.PANEL_ADMIN_EMAIL || 'admin@pterodactyl.io' }}
          PANEL_ADMIN_USER: ${{ secrets.PANEL_ADMIN_USER || 'admin' }}
          APP_URL: "https://panel.projectxglory.qzz.io"
          DB_ROOT_PASSWORD: "pterodactyl_root_secure_2024"
          DB_PASSWORD: "pterodactyl_panel_secure_2024"
          HASHIDS_SALT: "nookure_theme_salt_secure_2024"

      - name: Start Minecraft Server
        run: bash scripts/start-server.sh

      - name: Telegram - Server Online
        run: bash scripts/telegram-notify.sh "online"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_NUMBER: ${{ github.run_number }}

      - name: Monitor Server (5h 30m)
        run: bash scripts/monitor-server.sh
        env:
          PLAYIT_SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}

      - name: Shutdown Server Gracefully
        run: bash scripts/shutdown-server.sh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Create & Upload Backup
        run: python3 scripts/backup-manager.py upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          RUN_NUMBER: ${{ github.run_number }}

      - name: Telegram - Backup Complete
        run: bash scripts/telegram-notify.sh "backup-done"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Trigger Next Workflow
        run: bash scripts/trigger-next.sh
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Telegram - New Server Starting
        run: bash scripts/telegram-notify.sh "restarting"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Cleanup
        run: sleep 30
